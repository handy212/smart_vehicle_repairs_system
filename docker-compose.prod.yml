# Production overlay — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Do not expose Postgres/Redis on the host. TLS is typically handled by
# Nginx Proxy Manager in front of the internal nginx service.

services:
  db:
    ports: []
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}

  redis:
    ports: []
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      DATABASE_URL: postgresql://${DB_USER:-svr_user}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-svr_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ready/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  celery:
    mem_limit: 1g
    cpus: "1.0"
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      DATABASE_URL: postgresql://${DB_USER:-svr_user}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-svr_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME 2>/dev/null | grep -q OK || celery -A config inspect ping 2>/dev/null | grep -q OK"]
      interval: 30s
      timeout: 15s
      start_period: 90s
      retries: 3

  celery-heavy:
    mem_limit: 1g
    cpus: "1.0"
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      DATABASE_URL: postgresql://${DB_USER:-svr_user}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-svr_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d heavy@$$HOSTNAME 2>/dev/null | grep -q OK || celery -A config inspect ping 2>/dev/null | grep -q OK"]
      interval: 30s
      timeout: 15s
      start_period: 90s
      retries: 3

  celerybeat:
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DATABASE_URL: postgresql://${DB_USER:-svr_user}:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/${DB_NAME:-svr_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*beat' >/dev/null"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  nginx:
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf.http-npm:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - ./media:/var/www/media:ro

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000/api}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
        NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-production}
        NEXT_PUBLIC_SENTRY_RELEASE: ${NEXT_PUBLIC_SENTRY_RELEASE:-}
        NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0.1}
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000/api}
