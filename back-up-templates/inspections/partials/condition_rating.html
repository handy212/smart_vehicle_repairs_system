<div class="my-4">

        <label class="flex flex-col items-center cursor-pointer p-3 rounded-lg border-2 border-slate-200 hover:bg-slate-50 transition-all has-[:checked]:border-primary has-[:checked]:bg-primary/10">

            </span>
            <span class="text-xs font-semibold text-slate-700 uppercase">Excellent</span>
