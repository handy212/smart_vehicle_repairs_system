<div class="border-2 border-dashed border-slate-300 rounded-lg p-4 bg-white" data-signature-type="{{ signature_type }}">
    <canvas id="signaturePad_{{ signature_type }}" class="w-full h-48 border border-slate-300 rounded-lg touch-none cursor-crosshair"></canvas>
    <input type="hidden" name="signature_{{ signature_type }}" id="signatureData_{{ signature_type }}">
    
    <div class="flex items-center gap-2 mt-3">
        <button type="button" class="px-3 py-1.5 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors text-sm font-medium" onclick="clearSignature('{{ signature_type }}')">
            <i class="fas fa-eraser mr-1"></i>Clear
        </button>
        <button type="button" class="px-3 py-1.5 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium" onclick="saveSignature('{{ signature_type }}')">
            <i class="fas fa-save mr-1"></i>Save
        </button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
<script>
// Initialize signature pads
const signaturePads = {};

document.addEventListener('DOMContentLoaded', function() {
    const canvas = document.getElementById('signaturePad_{{ signature_type }}');
    if (canvas) {
        // Set canvas size
        function resizeCanvas() {
            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext('2d').scale(ratio, ratio);
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Initialize SignaturePad
        signaturePads['{{ signature_type }}'] = new SignaturePad(canvas, {
            backgroundColor: 'rgb(255, 255, 255)',
            penColor: 'rgb(0, 0, 0)',
            minWidth: 1,
            maxWidth: 2.5,
        });
    }
});

function clearSignature(type) {
    if (signaturePads[type]) {
        signaturePads[type].clear();
        document.getElementById('signatureData_' + type).value = '';
    }
}

function saveSignature(type) {
    if (signaturePads[type]) {
        if (signaturePads[type].isEmpty()) {
            alert('Please provide a signature first.');
            return;
        }
        
        // Get signature as data URL
        const dataURL = signaturePads[type].toDataURL('image/png');
        document.getElementById('signatureData_' + type).value = dataURL;
        
        // Show confirmation
        alert('Signature saved successfully!');
    }
}

// Prevent scrolling when signing
document.addEventListener('touchmove', function(e) {
    if (e.target.classList.contains('signature-canvas') || e.target.id.startsWith('signaturePad_')) {
        e.preventDefault();
    }
}, { passive: false });
</script>
