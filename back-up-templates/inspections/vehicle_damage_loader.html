<!-- Vehicle Damage Data Loader -->
{% if inspection and inspection.vehicle_damage %}
<script>
(function() {
    'use strict';
    
    /**
     * Vehicle Damage Data Loader
     * Handles loading and initializing vehicle damage data from the database
     * Supports both vehicleDamageMarker and vehicleDamageMarkerFix implementations
     */
    class VehicleDamageLoader {
        constructor() {
            this.maxRetries = 5;
            this.retryDelay = 500; // milliseconds
            this.currentRetry = 0;
            this.damageData = null;
            this.markerInstance = null;
        }
        
        /**
         * Initialize the loader
         */
        init() {
            try {
                // Parse damage data from template
                const damageDataStr = '{{ inspection.vehicle_damage|escapejs }}';
                
                if (!damageDataStr || damageDataStr.trim() === '' || 
                    damageDataStr === '[]' || damageDataStr === '{}' || damageDataStr === 'null') {
                    console.log('[VehicleDamageLoader] No damage data to load');
                    return;
                }
                
                this.damageData = JSON.parse(damageDataStr);
                
                if (!Array.isArray(this.damageData) || this.damageData.length === 0) {
                    console.log('[VehicleDamageLoader] Empty damage data array');
                    return;
                }
                
                console.log(`[VehicleDamageLoader] Found ${this.damageData.length} damage marker(s) to load`);
                
                // Start loading process
                this.loadDamageData();
            } catch (error) {
                console.error('[VehicleDamageLoader] Error parsing damage data:', error);
                this.showError('Failed to parse vehicle damage data. Please refresh the page.');
            }
        }
        
        /**
         * Load damage data into the marker instance
         */
        loadDamageData() {
            // Try to find marker instance
            this.markerInstance = this.findMarkerInstance();
            
            if (this.markerInstance && typeof this.markerInstance.loadDamageData === 'function') {
                try {
                    this.markerInstance.loadDamageData(this.damageData);
                    console.log('[VehicleDamageLoader] Successfully loaded damage data');
                    this.showSuccess();
                } catch (error) {
                    console.error('[VehicleDamageLoader] Error loading damage data:', error);
                    this.handleRetry();
                }
            } else {
                // Marker not ready yet, retry
                this.handleRetry();
            }
        }
        
        /**
         * Find the marker instance (supports both implementations)
         */
        findMarkerInstance() {
            // Try primary implementation
            if (window.vehicleDamageMarker && typeof window.vehicleDamageMarker.loadDamageData === 'function') {
                return window.vehicleDamageMarker;
            }
            
            // Try fix implementation
            if (window.vehicleDamageMarkerFix && typeof window.vehicleDamageMarkerFix.loadDamageData === 'function') {
                return window.vehicleDamageMarkerFix;
            }
            
            // Try class-based implementation
            if (window.vehicleDamageMarker && window.vehicleDamageMarker instanceof VehicleDamageMarker) {
                return window.vehicleDamageMarker;
            }
            
            return null;
        }
        
        /**
         * Handle retry logic
         */
        handleRetry() {
            if (this.currentRetry >= this.maxRetries) {
                console.error('[VehicleDamageLoader] Max retries reached. Damage data may not load correctly.');
                this.showWarning('Vehicle damage markers may not display correctly. Please refresh the page if needed.');
                return;
            }
            
            this.currentRetry++;
            const delay = this.retryDelay * this.currentRetry; // Exponential backoff
            
            console.log(`[VehicleDamageLoader] Retry ${this.currentRetry}/${this.maxRetries} in ${delay}ms...`);
            
            setTimeout(() => {
                this.loadDamageData();
            }, delay);
        }
        
        /**
         * Show success notification (optional visual feedback)
         */
        showSuccess() {
            // Optional: Add visual feedback that damage data was loaded
            // You can customize this based on your UI needs
            if (window.console && console.log) {
                console.log('[VehicleDamageLoader] ✓ Damage data loaded successfully');
            }
        }
        
        /**
         * Show error notification
         */
        showError(message) {
            console.error('[VehicleDamageLoader]', message);
            // Optional: Show user-facing error notification
            // You can integrate with your notification system here
        }
        
        /**
         * Show warning notification
         */
        showWarning(message) {
            console.warn('[VehicleDamageLoader]', message);
            // Optional: Show user-facing warning notification
        }
        
        /**
         * Validate damage data structure
         */
        validateDamageData(data) {
            if (!Array.isArray(data)) {
                return false;
            }
            
            return data.every(item => {
                return item &&
                       typeof item.x === 'number' &&
                       typeof item.y === 'number' &&
                       typeof item.type === 'string' &&
                       item.x >= 0 && item.x <= 100 &&
                       item.y >= 0 && item.y <= 100;
            });
        }
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            const loader = new VehicleDamageLoader();
            loader.init();
        });
    } else {
        // DOM already loaded
        const loader = new VehicleDamageLoader();
        loader.init();
    }
})();
</script>
{% endif %}
