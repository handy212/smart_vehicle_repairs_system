<!-- Notification Bell Icon for Header -->
<div class="relative" id="notificationBell">
    <a class="relative p-2 text-slate-700 hover:text-primary transition-colors" href="#" role="button" id="notificationBellBtn">
        <i class="fas fa-bell text-lg"></i>
        <span class="absolute top-0 right-0 w-5 h-5 bg-rose-600 text-white text-xs font-bold rounded-full flex items-center justify-center transform translate-x-1/2 -translate-y-1/2" id="notificationBadge" style="display: none;">
            0
        </span>
    </a>
    <div id="notificationDropdown" class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-xl border border-slate-200 z-50 hidden">
        <div class="px-4 py-3 border-b border-slate-200 bg-gradient-to-r from-slate-50 to-white flex justify-between items-center">
            <span class="text-sm font-semibold text-slate-900">Notifications</span>
            <a href="{% url 'notifications:notification-center' %}" class="text-xs text-primary hover:text-primary/80 font-medium">View All</a>
        </div>
        <div id="notificationDropdownContent" class="max-h-80 overflow-y-auto">
            <div class="text-center py-8">
                <div class="inline-block w-6 h-6 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs text-slate-500 mt-2">Loading...</p>
            </div>
        </div>
    </div>
</div>

<style>
    #notificationDropdownContent::-webkit-scrollbar {
        width: 6px;
    }
    
    #notificationDropdownContent::-webkit-scrollbar-track {
        background: #f1f1f1;
    }
    
    #notificationDropdownContent::-webkit-scrollbar-thumb {
        background: #888;
        border-radius: 3px;
    }
    
    #notificationDropdownContent::-webkit-scrollbar-thumb:hover {
        background: #555;
    }
</style>

<script>
// Notification system namespace (prevents redeclaration errors)
if (typeof window.NotificationSystem === 'undefined') {
    window.NotificationSystem = {
        notificationSound: null,
        lastNotificationCount: 0,
        audioContext: null,
        audioContextInitialized: false
    };
}

// Initialize audio context (must be done after user interaction)
function initializeAudioContext() {
    if (!window.NotificationSystem.audioContextInitialized) {
        try {
            window.NotificationSystem.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            window.NotificationSystem.audioContextInitialized = true;
            console.log('Audio context initialized');
        } catch (e) {
            console.error('Failed to initialize audio context:', e);
        }
    }
}

// Create notification sound
function createNotificationSound() {
    try {
        if (!window.NotificationSystem.audioContext) {
            initializeAudioContext();
        }
        
        const audioContext = window.NotificationSystem.audioContext;
        if (!audioContext) {
            return false;
        }
        
        // Resume audio context if suspended (required in some browsers)
        if (audioContext.state === 'suspended') {
            audioContext.resume();
        }
        
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 800; // Frequency in Hz
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.3);
        
        console.log('Notification sound played');
        return true;
    } catch (e) {
        console.error('Error creating notification sound:', e);
        return false;
    }
}

// Play notification sound
function playNotificationSound() {
    try {
        console.log('Attempting to play notification sound...');
        const played = createNotificationSound();
        if (!played) {
            console.warn('Sound playback failed - may need user interaction first');
        }
    } catch (e) {
        console.error('Error playing notification sound:', e);
    }
}

// Show browser notification
function showBrowserNotification(title, message) {
    // Check if browser supports notifications
    if (!("Notification" in window)) {
        console.log("This browser does not support desktop notifications");
        return;
    }
    
    // Check if permission is granted
    if (Notification.permission === "granted") {
        new Notification(title, {
            body: message,
            icon: '/static/icons/icon-192x192.png',
            badge: '/static/icons/icon-72x72.png',
            tag: 'notification-' + Date.now()
        });
    } else if (Notification.permission !== "denied") {
        // Request permission
        Notification.requestPermission().then(function (permission) {
            if (permission === "granted") {
                new Notification(title, {
                    body: message,
                    icon: '/static/icons/icon-192x192.png',
                    badge: '/static/icons/icon-72x72.png'
                });
            }
        });
    }
}

// Show toast notification - use new ToastSystem if available
function showToastNotification(title, message, type = 'info') {
    if (window.showToast) {
        // Use the new improved ToastSystem
        window.showToast({
            title: title,
            message: message,
            type: type,
            duration: 5000
        });
    } else {
        // Fallback for when ToastSystem hasn't loaded yet
        console.warn('ToastSystem not available, using fallback');
        alert(title + ': ' + message);
    }
}

// Animate bell icon
function animateBellIcon() {
    const bellIcon = document.querySelector('#notificationBell .fa-bell');
    if (bellIcon) {
        bellIcon.classList.add('fa-shake');
        setTimeout(() => {
            bellIcon.classList.remove('fa-shake');
        }, 1000);
    }
}

// Update notification bell with sound and visual alerts
function updateNotificationBell(playSound = false) {
    fetch('{% url "notifications:unread-count" %}')
        .then(response => response.json())
        .then(data => {
            const badge = document.getElementById('notificationBadge');
            const currentCount = data.count || 0;
            const lastCount = window.NotificationSystem.lastNotificationCount;
            
            // Check if there are new notifications
            if (playSound && currentCount > lastCount && lastCount >= 0) {
                const newNotificationsCount = currentCount - lastCount;
                
                console.log(`🔔 New notifications detected: ${newNotificationsCount}`);
                
                // Play sound
                playNotificationSound();
                
                // Animate bell
                animateBellIcon();
                
                // Show toast notification
                showToastNotification(
                    'New Notification' + (newNotificationsCount > 1 ? 's' : ''),
                    `You have ${newNotificationsCount} new notification` + (newNotificationsCount > 1 ? 's' : ''),
                    'info'
                );
                
                // Show browser notification
                showBrowserNotification(
                    'New Notification' + (newNotificationsCount > 1 ? 's' : ''),
                    `You have ${newNotificationsCount} new notification` + (newNotificationsCount > 1 ? 's' : '')
                );
            }
            
            // Update badge
            if (badge) {
                if (currentCount > 0) {
                    badge.textContent = currentCount > 99 ? '99+' : currentCount;
                    badge.style.display = 'flex';
                } else {
                    badge.style.display = 'none';
                }
            }
            
            // Update last count
            window.NotificationSystem.lastNotificationCount = currentCount;
        })
        .catch(error => {
            // Silently fail if notifications endpoint is not available
            // This prevents console spam when the endpoint is not configured
            if (window.NotificationSystem.lastNotificationCount === -1) {
                // Only log on first failure
                console.warn('Notifications endpoint not available. Real-time notifications disabled.');
                window.NotificationSystem.lastNotificationCount = 0; // Prevent further logging
            }
        });
}

// Test function for debugging (available in console)
window.testNotification = function() {
    console.log('🧪 Testing notification system...');
    playNotificationSound();
    animateBellIcon();
    showToastNotification('Test Notification', 'This is a test notification', 'info');
    showBrowserNotification('Test Notification', 'This is a test notification');
    console.log('✅ Test complete - check if you heard sound and saw visual alerts');
};

// Initialize dropdown toggle (only once to prevent redeclaration errors)
(function initNotificationDropdown() {
    // Check if already initialized
    if (window.NotificationSystem && window.NotificationSystem.dropdownInitialized) {
        return;
    }
    
    // Mark as initialized
    if (!window.NotificationSystem) {
        window.NotificationSystem = {};
    }
    window.NotificationSystem.dropdownInitialized = true;
    
    // Wait for DOM to be ready
    function setupDropdown() {
        const notificationBellBtn = document.getElementById('notificationBellBtn');
        const notificationDropdown = document.getElementById('notificationDropdown');
        
        if (!notificationBellBtn || !notificationDropdown) {
            // Retry if elements not found yet
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', setupDropdown);
            }
            return;
        }
        
        // Remove existing listeners if any (prevent duplicates)
        const newBtn = notificationBellBtn.cloneNode(true);
        notificationBellBtn.parentNode.replaceChild(newBtn, notificationBellBtn);
        
        // Setup click handler
        newBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            notificationDropdown.classList.toggle('hidden');
            
            // Load notifications when dropdown is opened
            if (!notificationDropdown.classList.contains('hidden')) {
                const content = document.getElementById('notificationDropdownContent');
                
                // Fetch only unread notifications
                fetch('{% url "notifications:recent-notifications" %}?limit=10&unread_only=true')
                    .then(response => response.json())
                    .then(data => {
                        if (data.notifications.length === 0) {
                            content.innerHTML = `
                                <div class="text-center py-8 text-slate-500">
                                    <i class="fas fa-check-circle text-3xl text-emerald-600 mb-3 block"></i>
                                    <p class="text-sm font-medium mb-2">All caught up!</p>
                                    <div class="mt-3">
                                        <a href="{% url 'notifications:notification-center' %}" class="inline-flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium">
                                            View All Notifications
                                        </a>
                                    </div>
                                </div>
                            `;
                        } else {
                            let html = '';
                            data.notifications.forEach(notification => {
                                const iconClass = (window.NotificationSystem && window.NotificationSystem.getNotificationIcon) 
                                    ? window.NotificationSystem.getNotificationIcon(notification.notification_type)
                                    : 'fa-bell';
                                const timeAgo = (window.NotificationSystem && window.NotificationSystem.getTimeAgo)
                                    ? window.NotificationSystem.getTimeAgo(notification.created_at)
                                    : 'Recently';
                                html += `
                                    <a href="${notification.url}" class="block px-4 py-3 hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-b-0">
                                        <div class="flex gap-3">
                                            <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center flex-shrink-0">
                                                <i class="fas ${iconClass} text-sm"></i>
                                            </div>
                                            <div class="flex-1 min-w-0">
                                                <div class="text-sm font-semibold text-slate-900 mb-1">${notification.title}</div>
                                                <div class="text-xs text-slate-600 line-clamp-2 mb-1">${notification.message}</div>
                                                <div class="text-xs text-slate-500 flex items-center justify-between">
                                                    <span class="flex items-center gap-1">
                                                        <i class="fas fa-clock"></i>
                                                        ${timeAgo}
                                                    </span>
                                                    <span class="px-2 py-0.5 bg-primary text-white text-xs font-semibold rounded-full">New</span>
                                                </div>
                                            </div>
                                        </div>
                                    </a>
                                `;
                            });
                            content.innerHTML = html;
                        }
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        content.innerHTML = '<div class="text-center py-6 text-rose-600"><i class="fas fa-exclamation-circle text-2xl mb-2 block"></i><p class="text-sm">Error loading notifications</p></div>';
                    });
            }
        });
        
        // Close dropdown when clicking outside (only add once)
        if (!window.NotificationSystem.clickOutsideHandler) {
            window.NotificationSystem.clickOutsideHandler = function(event) {
                if (!newBtn.contains(event.target) && !notificationDropdown.contains(event.target)) {
                    notificationDropdown.classList.add('hidden');
                }
            };
            document.addEventListener('click', window.NotificationSystem.clickOutsideHandler);
        }
    }
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setupDropdown);
    } else {
        setupDropdown();
    }
})();

// Helper functions (using namespace to prevent redeclaration)
if (typeof window.NotificationSystem.getNotificationIcon === 'undefined') {
    window.NotificationSystem.getNotificationIcon = function(type) {
        const icons = {
            'appointment': 'fa-calendar',
            'work_order': 'fa-wrench',
            'invoice': 'fa-file-invoice',
            'payment': 'fa-credit-card',
            'inspection': 'fa-clipboard-check',
            'inventory': 'fa-boxes',
            'vehicle': 'fa-car',
            'system': 'fa-bell'
        };
        return icons[type] || 'fa-bell';
    };
}

if (typeof window.NotificationSystem.getTimeAgo === 'undefined') {
    window.NotificationSystem.getTimeAgo = function(isoDate) {
        const date = new Date(isoDate);
        const now = new Date();
        const seconds = Math.floor((now - date) / 1000);
        
        if (seconds < 60) return 'Just now';
        if (seconds < 3600) return Math.floor(seconds / 60) + ' minutes ago';
        if (seconds < 86400) return Math.floor(seconds / 3600) + ' hours ago';
        return Math.floor(seconds / 86400) + ' days ago';
    };
}

// Create function aliases only if they don't exist (prevents redeclaration)
if (typeof getNotificationIcon === 'undefined') {
    window.getNotificationIcon = window.NotificationSystem.getNotificationIcon;
}
if (typeof getTimeAgo === 'undefined') {
    window.getTimeAgo = window.NotificationSystem.getTimeAgo;
}

// Initialize audio context on first user interaction (required by browsers)
document.addEventListener('click', function initAudioOnce() {
    initializeAudioContext();
    console.log('Audio context ready for notifications');
}, { once: true });

// Also try on any key press
document.addEventListener('keydown', function initAudioOnceKey() {
    initializeAudioContext();
}, { once: true });

// Request notification permission on page load
if ("Notification" in window && Notification.permission === "default") {
    // Only request permission when user interacts with the page
    document.addEventListener('click', function requestPermissionOnce() {
        Notification.requestPermission();
        document.removeEventListener('click', requestPermissionOnce);
    }, { once: true });
}

// Initial load without sound
updateNotificationBell(false);

// Update bell every 5 seconds with sound enabled (more frequent for real-time feel)
setInterval(() => updateNotificationBell(true), 5000);

// Add a test button in console for debugging
console.log('%c🔊 Notification Sound Test', 'color: blue; font-size: 16px; font-weight: bold');
console.log('To test notification sound, run: playNotificationSound()');
console.log('To test full notification, run: testNotification()');
</script>
