<!-- Push Notification Permission Card -->
<div class="bg-white border-2 border-primary rounded-xl shadow-sm overflow-hidden mt-6" id="pushPermissionCard" style="display: none;">
    <div class="px-4 py-3 bg-gradient-to-r from-primary to-primary/80 text-white">
        <h6 class="text-sm font-semibold flex items-center gap-2">
            <i class="fas fa-mobile-alt"></i>
            Enable Push Notifications
        </h6>
    </div>
    <div class="p-4">
        <p class="text-sm text-slate-600 mb-4">
            Get instant notifications about appointments, work orders, and important updates.
        </p>
        <div class="space-y-2">
            <button type="button" class="w-full px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium" onclick="requestPushPermission()">
                <i class="fas fa-bell mr-2"></i>Enable Notifications
            </button>
            <button type="button" class="w-full px-4 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors text-sm font-medium" onclick="dismissPushPrompt()">
                Maybe Later
            </button>
        </div>
        <div id="pushPermissionStatus" class="mt-3" style="display: none;"></div>
    </div>
</div>

<script>
// Check if push notifications are supported and not already granted
function checkPushPermissionStatus() {
    if (!('Notification' in window)) {
        console.log('Push notifications not supported');
        return;
    }

    if (Notification.permission === 'default') {
        // Show the permission card
        document.getElementById('pushPermissionCard').style.display = 'block';
    } else if (Notification.permission === 'granted') {
        showPushStatus('success', 'Push notifications are enabled');
    } else if (Notification.permission === 'denied') {
        showPushStatus('danger', 'Push notifications are blocked. Please enable them in your browser settings.');
    }
}

async function requestPushPermission() {
    try {
        const permission = await Notification.requestPermission();
        
        if (permission === 'granted') {
            showPushStatus('success', 'Push notifications enabled successfully!');
            
            // Register FCM token (requires Firebase setup)
            await registerFCMToken();
            
            // Hide the card after a delay
            setTimeout(() => {
                document.getElementById('pushPermissionCard').style.display = 'none';
            }, 3000);
        } else if (permission === 'denied') {
            showPushStatus('danger', 'Push notifications were blocked. You can enable them in browser settings.');
        } else {
            showPushStatus('warning', 'Permission request was dismissed.');
        }
    } catch (error) {
        console.error('Error requesting push permission:', error);
        showPushStatus('danger', 'Error enabling push notifications. Please try again.');
    }
}

async function registerFCMToken() {
    try {
        // Check if Firebase is available
        if (typeof firebase === 'undefined' || !firebase.messaging) {
            console.warn('Firebase messaging not available');
            return;
        }

        const messaging = firebase.messaging();
        const token = await messaging.getToken({
            vapidKey: '{{ FIREBASE_VAPID_KEY }}'  // Add this to your context
        });

        if (token) {
            // Send token to backend
            await fetch('/api/notifications/register-token/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: JSON.stringify({
                    token: token,
                    device_name: navigator.userAgent
                })
            });

            console.log('FCM token registered successfully');
        }
    } catch (error) {
        console.error('Error registering FCM token:', error);
    }
}

function showPushStatus(type, message) {
    const statusDiv = document.getElementById('pushPermissionStatus');
    const bgColor = type === 'success' ? 'bg-emerald-50 border-emerald-200 text-emerald-700' : 
                    type === 'danger' ? 'bg-rose-50 border-rose-200 text-rose-700' : 
                    'bg-amber-50 border-amber-200 text-amber-700';
    const icon = type === 'success' ? 'fa-check-circle' : type === 'danger' ? 'fa-exclamation-circle' : 'fa-info-circle';
    
    statusDiv.innerHTML = `
        <div class="p-3 rounded-lg border ${bgColor}">
            <div class="flex items-center gap-2">
                <i class="fas ${icon}"></i>
                <span class="text-sm font-medium">${message}</span>
            </div>
        </div>
    `;
    statusDiv.style.display = 'block';
}

function dismissPushPrompt() {
    document.getElementById('pushPermissionCard').style.display = 'none';
    // Store dismissal in localStorage to not show again for a while
    localStorage.setItem('pushPromptDismissed', Date.now());
}

// Check if user dismissed the prompt recently (within 7 days)
function shouldShowPushPrompt() {
    const dismissed = localStorage.getItem('pushPromptDismissed');
    if (!dismissed) return true;
    
    const daysSinceDismissed = (Date.now() - parseInt(dismissed)) / (1000 * 60 * 60 * 24);
    return daysSinceDismissed > 7;
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
    if (shouldShowPushPrompt()) {
        checkPushPermissionStatus();
    }
});
</script>
