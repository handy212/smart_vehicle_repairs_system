<div class="relative">
    <button type="button" class="inline-flex items-center gap-2 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors" onclick="toggleExportDropdown()">
        <i class="fas fa-download"></i>
        <span>Export</span>
        <i class="fas fa-chevron-down text-xs"></i>
    </button>
    <div id="exportDropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-lg border border-slate-200 shadow-lg z-50">
        <div class="py-1">
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors" href="#" onclick="exportToPDF()">
                <i class="fas fa-file-pdf text-rose-600 mr-2"></i>Export to PDF
            </a>
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors" href="#" onclick="exportToExcel()">
                <i class="fas fa-file-excel text-emerald-600 mr-2"></i>Export to Excel
            </a>
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors" href="#" onclick="exportToCSV()">
                <i class="fas fa-file-csv text-blue-600 mr-2"></i>Export to CSV
            </a>
            <div class="border-t border-slate-200 my-1"></div>
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors" href="#" onclick="printReport()">
                <i class="fas fa-print mr-2 text-slate-400"></i>Print Report
            </a>
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors" href="#" onclick="openEmailModal()">
                <i class="fas fa-envelope mr-2 text-slate-400"></i>Email Report
            </a>
            <div class="border-t border-slate-200 my-1"></div>
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors" href="#" onclick="openSaveModal()">
                <i class="fas fa-bookmark mr-2 text-slate-400"></i>Save Report
            </a>
            <a class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-50 transition-colors" href="#" onclick="openScheduleModal()">
                <i class="fas fa-clock mr-2 text-slate-400"></i>Schedule Report
            </a>
        </div>
    </div>
</div>

<!-- Email Report Modal -->
<div id="emailReportModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-black/50 transition-opacity" onclick="closeEmailModal()"></div>
        <div class="relative bg-white rounded-xl shadow-lg max-w-md w-full">
            <div class="px-6 py-4 border-b border-slate-200 bg-gradient-to-r from-primary/10 to-white flex justify-between items-center">
                <h5 class="text-sm font-semibold text-slate-900">Email Report</h5>
                <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeEmailModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="emailReportForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-2">Email Address(es)</label>
                        <input type="text" 
                               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" 
                               name="email_recipients" 
                               placeholder="email1@example.com, email2@example.com"
                               required>
                        <small class="text-xs text-slate-500 mt-1 block">Separate multiple emails with commas</small>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-2">Subject</label>
                        <input type="text" 
                               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" 
                               name="subject" 
                               value="Report from Smart Vehicle Repairs">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-2">Message (Optional)</label>
                        <textarea class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" 
                                  name="message" 
                                  rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
                <button type="button" class="inline-flex items-center gap-2 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors" onclick="closeEmailModal()">Cancel</button>
                <button type="button" class="inline-flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition-colors" onclick="sendEmailReport()">
                    <i class="fas fa-paper-plane"></i>
                    <span>Send</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Save Report Modal -->
<div id="saveReportModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
    <div class="flex items-center justify-center min-h-screen px-4">
        <div class="fixed inset-0 bg-black/50 transition-opacity" onclick="closeSaveModal()"></div>
        <div class="relative bg-white rounded-xl shadow-lg max-w-md w-full">
            <div class="px-6 py-4 border-b border-slate-200 bg-gradient-to-r from-primary/10 to-white flex justify-between items-center">
                <h5 class="text-sm font-semibold text-slate-900">Save Report</h5>
                <button type="button" class="text-slate-500 hover:text-slate-700" onclick="closeSaveModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="saveReportForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-2">Report Name</label>
                        <input type="text" 
                               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" 
                               name="report_name" 
                               required>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-700 mb-2">Description</label>
                        <textarea class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" 
                                  name="description" 
                                  rows="2"></textarea>
                    </div>
                    <div>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" 
                                   class="w-4 h-4 border-slate-300 rounded text-primary focus:ring-primary" 
                                   name="is_public" 
                                   id="isPublic">
                            <span class="text-sm text-slate-700">Share with all users</span>
                        </label>
                    </div>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-3">
                <button type="button" class="inline-flex items-center gap-2 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors" onclick="closeSaveModal()">Cancel</button>
                <button type="button" class="inline-flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition-colors" onclick="saveReport()">
                    <i class="fas fa-save"></i>
                    <span>Save</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function toggleExportDropdown() {
    const dropdown = document.getElementById('exportDropdown');
    dropdown.classList.toggle('hidden');
    
    // Close dropdown when clicking outside
    document.addEventListener('click', function closeDropdown(e) {
        if (!dropdown.contains(e.target) && !e.target.closest('.relative')) {
            dropdown.classList.add('hidden');
            document.removeEventListener('click', closeDropdown);
        }
    });
}

function openEmailModal() {
    document.getElementById('emailReportModal').classList.remove('hidden');
    document.getElementById('exportDropdown').classList.add('hidden');
}

function closeEmailModal() {
    document.getElementById('emailReportModal').classList.add('hidden');
}

function openSaveModal() {
    document.getElementById('saveReportModal').classList.remove('hidden');
    document.getElementById('exportDropdown').classList.add('hidden');
}

function closeSaveModal() {
    document.getElementById('saveReportModal').classList.add('hidden');
}

function openScheduleModal() {
    document.getElementById('exportDropdown').classList.add('hidden');
    window.location.href = '/reporting/schedules/create/';
}

function exportToPDF() {
    document.getElementById('exportDropdown').classList.add('hidden');
    window.print();
}

function exportToExcel() {
    document.getElementById('exportDropdown').classList.add('hidden');
    const url = window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'export=excel';
    window.location.href = url;
}

function exportToCSV() {
    document.getElementById('exportDropdown').classList.add('hidden');
    const url = window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'export=csv';
    window.location.href = url;
}

function printReport() {
    document.getElementById('exportDropdown').classList.add('hidden');
    window.print();
}

function sendEmailReport() {
    const form = document.getElementById('emailReportForm');
    const formData = new FormData(form);
    
    // Add current report parameters
    formData.append('report_url', window.location.href);
    
    fetch('/reporting/email-report/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Report sent successfully!');
            closeEmailModal();
        } else {
            alert('Error sending report: ' + data.error);
        }
    });
}

function saveReport() {
    const form = document.getElementById('saveReportForm');
    const formData = new FormData(form);
    
    // Add current report parameters
    formData.append('report_url', window.location.href);
    formData.append('report_type', document.querySelector('[data-report-type]')?.dataset.reportType || 'custom');
    
    fetch('/reporting/save-report/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Report saved successfully!');
            closeSaveModal();
        } else {
            alert('Error saving report: ' + data.error);
        }
    });
}
</script>
