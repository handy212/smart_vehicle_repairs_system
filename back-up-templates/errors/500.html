<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            color: white;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 700;
            line-height: 1;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <h1 class="mb-3">Server Error</h1>
        <p class="lead mb-4">Something went wrong on our end. We're working to fix it!</p>
        <i class="fas fa-tools fa-5x mb-4 opacity-75"></i>
        <div>
            <a href="/" class="btn btn-light btn-lg me-2">
                <i class="fas fa-home me-2"></i> Go Home
            </a>
            <a href="javascript:location.reload()" class="btn btn-outline-light btn-lg">
                <i class="fas fa-redo me-2"></i> Try Again
            </a>
        </div>
    </div>
</body>
</html>
