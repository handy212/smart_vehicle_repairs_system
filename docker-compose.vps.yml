# VPS overlay for a host where Nginx Proxy Manager owns ports 80/443.
# Use with docker-compose.yml and docker-compose.prod.yml.

services:
  db:
    ports: !override []
    mem_limit: 1g
    cpus: "1.0"

  redis:
    ports: !override []
    mem_limit: 256m
    cpus: "0.50"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}

  backend:
    mem_limit: 1g
    cpus: "1.5"
    command:
      - gunicorn
      - --bind
      - 0.0.0.0:8000
      - --workers
      - "2"
      - --timeout
      - "120"
      - --access-logfile
      - "-"
      - --error-logfile
      - "-"
      - config.wsgi:application
    environment:
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-True}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-True}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ready/"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5

  celery:
    mem_limit: 1g
    cpus: "1.0"
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}

  celery-heavy:
    mem_limit: 1g
    cpus: "1.0"
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}

  celerybeat:
    mem_limit: 384m
    cpus: "0.25"
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
    healthcheck:
      disable: true

  frontend:
    mem_limit: 512m
    cpus: "0.75"

  nginx:
    mem_limit: 128m
    cpus: "0.25"
    ports: !override
      - "127.0.0.1:8080:80"
    networks:
      - svr_network
      - proxy
    volumes: !override
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf.http-npm:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - ./media:/var/www/media:ro

networks:
  proxy:
    external: true
    name: proxy
