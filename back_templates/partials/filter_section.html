{# Standardized Filter Section Component using Tailwind CSS #}
{# Usage: {% include 'partials/filter_section.html' with form_content="<div>...</div>" %} #}

<div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 mb-6">
    <form method="get" class="space-y-4">
        {{ form_content|safe }}
        <div class="flex flex-wrap items-center gap-3 pt-4 border-t border-slate-200">
            <button type="submit" class="inline-flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg font-medium hover:bg-primary/90 transition-colors">
                <i class="fas fa-filter"></i>
                Apply Filters
            </button>
            <a href="{{ clear_url|default:'?' }}" class="inline-flex items-center gap-2 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg font-medium hover:bg-slate-50 transition-colors">
                <i class="fas fa-times"></i>
                Clear Filters
            </a>
        </div>
    </form>
</div>
