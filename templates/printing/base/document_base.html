<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Document{% endblock %} - Smart Vehicle Repairs</title>

    <style>
        /* =========================================
           1. RESET & BASE
           ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            font-size: 9pt;
            /* Standard Body Text */
            line-height: 1.5;
            color: #111827;
            /* Gray-900 for high contrast */
            background: #fff;
        }

        /* Page Configuration */
        @page {
            size: A4;
            margin: 15mm;

            @bottom-center {
                content: "Page " counter(page) " of " counter(pages);
                font-family: 'Inter', sans-serif;
                font-size: 8pt;
                color: #9ca3af;
            }
        }

        /* =========================================
           2. UTILITIES (Spacing & Typography)
           ========================================= */

        /* Margins */
        .mb-1 {
            margin-bottom: 0.25rem;
        }

        .mb-2 {
            margin-bottom: 0.5rem;
        }

        .mb-3 {
            margin-bottom: 0.75rem;
        }

        .mb-4 {
            margin-bottom: 1rem;
        }

        .mb-6 {
            margin-bottom: 1.5rem;
        }

        .mb-8 {
            margin-bottom: 2rem;
        }

        .mt-2 {
            margin-top: 0.5rem;
        }

        .mt-4 {
            margin-top: 1rem;
        }

        .mt-8 {
            margin-top: 2rem;
        }

        /* Padding */
        .p-2 {
            padding: 0.5rem;
        }

        .p-4 {
            padding: 1rem;
        }

        .py-2 {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }

        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }

        /* Typography */
        .text-xs {
            font-size: 8pt;
        }

        .text-sm {
            font-size: 9pt;
        }

        .text-base {
            font-size: 10pt;
        }

        .text-lg {
            font-size: 12pt;
        }

        .text-xl {
            font-size: 14pt;
        }

        .text-2xl {
            font-size: 18pt;
        }

        .text-3xl {
            font-size: 22pt;
        }

        /* Main Headers */

        .font-normal {
            font-weight: 400;
        }

        .font-medium {
            font-weight: 500;
        }

        .font-semibold {
            font-weight: 600;
        }

        .font-bold {
            font-weight: 700;
        }

        .text-gray-500 {
            color: #6b7280;
        }

        .text-gray-700 {
            color: #374151;
        }

        .text-gray-900 {
            color: #111827;
        }

        .text-primary {
            color: #2563eb;
        }

        /* Brand Blue */
        .text-danger {
            color: #dc2626;
        }

        /* Red */
        .text-success {
            color: #16a34a;
        }

        /* Green */

        .uppercase {
            text-transform: uppercase;
        }

        .capitalize {
            text-transform: capitalize;
        }

        .text-right {
            text-align: right;
        }

        .text-center {
            text-align: center;
        }

        /* borders */
        .border-b {
            border-bottom: 1px solid #e5e7eb;
        }

        .border-t {
            border-top: 1px solid #e5e7eb;
        }

        .border-b-2 {
            border-bottom: 2px solid #e5e7eb;
        }

        .border-primary {
            border-color: #2563eb;
        }

        /* =========================================
           3. LAYOUT GRID
           ========================================= */
        .grid-2-col {
            display: -webkit-box;
            /* Flexbox fallback for weasyprint older versions if mostly compliant */
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .col-1-2 {
            width: 48%;
        }

        .col-2-3 {
            width: 66%;
        }

        .col-1-3 {
            width: 33%;
        }

        .w-full {
            width: 100%;
        }

        /* Clears for float-based fallbacks if needed, though Flex is preferred */
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }

        /* =========================================
           4. COMPONENT STYLES
           ========================================= */

        /* Header */
        .header-container {
            border-bottom: 3px solid #2563eb;
            padding-bottom: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .data-table th {
            background-color: #f3f4f6;
            text-align: left;
            padding: 8px 12px;
            font-weight: 600;
            color: #374151;
            font-size: 9pt;
            border-bottom: 2px solid #d1d5db;
        }

        .data-table td {
            padding: 8px 12px;
            border-bottom: 1px solid #e5e7eb;
            vertical-align: top;
            color: #1f2937;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table .row-notes {
            font-size: 8pt;
            color: #6b7280;
            font-style: italic;
            margin-top: 2px;
        }

        /* Info Boxes (Gray Cards) */
        .info-card {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 15px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-label {
            font-weight: 600;
            color: #4b5563;
            width: 35%;
        }

        .info-value {
            width: 65%;
            color: #111827;
        }

        /* Financial Summary */
        .financial-summary {
            width: 40%;
            margin-left: auto;
            /* Push to right */
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 10pt;
        }

        .summary-item.total {
            font-size: 13pt;
            font-weight: 700;
            color: #2563eb;
            border-top: 2px solid #111827;
            margin-top: 10px;
            padding-top: 10px;
        }

        .summary-item.subtotal {
            border-top: 1px solid #d1d5db;
            margin-top: 5px;
            padding-top: 5px;
            font-weight: 600;
        }

        /* Notes Box */
        .notes-box {
            background-color: #fffbeb;
            border: 1px solid #fcd34d;
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 4px;
            color: #92400e;
            font-size: 9pt;
        }

        /* Watermark */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 100pt;
            font-weight: 900;
            opacity: 0.08;
            /* Subtle */
            z-index: -1000;
            color: #e5e7eb;
            /* Default gray if no color set */
            text-transform: uppercase;
        }

        /* Print Optimization */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .no-print {
                display: none !important;
            }

            .page-break {
                page-break-before: always;
            }
        }
    </style>

    {% if watermark %}
    <style>
        .watermark {
            color: {
                    {
                    watermark.color
                }
            }

            ;
        }
    </style>
    {% endif %}

    {% block extra_styles %}{% endblock %}
</head>

<body>
    {% if watermark %}
    <div class="watermark">{{ watermark.text }}</div>
    {% endif %}

    <!-- Header Section -->
    <div class="header-container">
        {% include 'printing/base/components/header.html' %}
    </div>

    <!-- Main Content -->
    <div class="content-wrapper">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer will be handled by @page property but included here for semantics/browser print -->
    <div class="no-print border-t mt-8 pt-4 text-center text-gray-500 text-xs">
        {% include 'printing/base/components/footer.html' %}
    </div>
</body>

</html>
