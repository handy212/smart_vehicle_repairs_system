{# Revenue chart component using Tailwind CSS and Chart.js #}
<div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-200 bg-gradient-to-r from-slate-50 to-white">
        <div class="flex items-center justify-between">
            <h5 class="text-sm font-semibold text-slate-900">
                <i class="fas fa-chart-line mr-2 text-success"></i>
                Revenue Trend
            </h5>
            <div class="flex items-center gap-1">
                <button type="button" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-primary text-white border border-primary active" data-period="7">7 Days</button>
                <button type="button" class="px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 transition-colors" data-period="30">30 Days</button>
                <button type="button" class="px-3 py-1.5 text-xs font-medium rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-50 transition-colors" data-period="90">90 Days</button>
            </div>
        </div>
    </div>
    <div class="p-6">
        <canvas id="revenueChart" height="80"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const ctx = document.getElementById('revenueChart');
    if (!ctx) return;
    
    const ctx2d = ctx.getContext('2d');
    
    // Chart data from Django context
    const chartData = JSON.parse('{{ revenue_chart_data|escapejs }}');
    
    const labels = chartData.map(item => item.date);
    const data = chartData.map(item => item.revenue);
    
    const revenueChart = new Chart(ctx2d, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Revenue ($)',
                data: data,
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#10b981',
                pointBorderColor: '#fff',
                pointBorderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return '$' + context.parsed.y.toFixed(2);
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return '$' + value.toLocaleString();
                        }
                    },
                    grid: {
                        color: 'rgba(0, 0, 0, 0.05)'
                    }
                },
                x: {
                    grid: {
                        display: false
                    }
                }
            }
        }
    });
    
    // Period switching (reload with AJAX)
    document.querySelectorAll('[data-period]').forEach(btn => {
        btn.addEventListener('click', function() {
            const period = this.dataset.period;
            document.querySelectorAll('[data-period]').forEach(b => {
                b.classList.remove('active', 'bg-primary', 'text-white', 'border-primary');
                b.classList.add('border-slate-300', 'text-slate-700');
            });
            this.classList.add('active', 'bg-primary', 'text-white', 'border-primary');
            this.classList.remove('border-slate-300', 'text-slate-700');
            
            // Reload chart data via AJAX
            fetch(`/dashboard/api/revenue/?period=${period}`)
                .then(response => response.json())
                .then(data => {
                    revenueChart.data.labels = data.map(item => item.date);
                    revenueChart.data.datasets[0].data = data.map(item => item.revenue);
                    revenueChart.update();
                })
                .catch(error => console.error('Error loading revenue data:', error));
        });
    });
});
</script>
