{% comment %}
Revenue chart component using Chart.js
Requires: revenue_chart_data = [{'date': 'Oct 01', 'revenue': 1250.50}, ...]
{% endcomment %}

<div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-0">
        <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">
                <i class="fas fa-chart-line text-success me-2"></i>
                Revenue Trend
            </h5>
            <div class="btn-group btn-group-sm" role="group">
                <button type="button" class="btn btn-outline-secondary active" data-period="7">7 Days</button>
                <button type="button" class="btn btn-outline-secondary" data-period="30">30 Days</button>
                <button type="button" class="btn btn-outline-secondary" data-period="90">90 Days</button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <canvas id="revenueChart" height="80"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const ctx = document.getElementById('revenueChart').getContext('2d');
    
    // Chart data from Django context
    const chartData = JSON.parse('{{ revenue_chart_data|escapejs }}');
    
    const labels = chartData.map(item => item.date);
    const data = chartData.map(item => item.revenue);
    
    const revenueChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Revenue ($)',
                data: data,
                borderColor: '#10b981',
                backgroundColor: 'rgba(16, 185, 129, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4,
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#10b981',
                pointBorderColor: '#fff',
                pointBorderWidth: 2
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    display: false
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return '$' + context.parsed.y.toFixed(2);
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return '$' + value.toLocaleString();
                        }
                    },
                    grid: {
                        color: 'rgba(0, 0, 0, 0.05)'
                    }
                },
                x: {
                    grid: {
                        display: false
                    }
                }
            }
        }
    });
    
    // Period switching (reload with AJAX)
    document.querySelectorAll('[data-period]').forEach(btn => {
        btn.addEventListener('click', function() {
            const period = this.dataset.period;
            document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            // Reload chart data via AJAX
            fetch(`/dashboard/api/revenue/?period=${period}`)
                .then(response => response.json())
                .then(data => {
                    revenueChart.data.labels = data.map(item => item.date);
                    revenueChart.data.datasets[0].data = data.map(item => item.revenue);
                    revenueChart.update();
                })
                .catch(error => console.error('Error loading revenue data:', error));
        });
    });
});
</script>
