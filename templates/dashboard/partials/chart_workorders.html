{% comment %}
Work orders status chart component
Requires: workorder_stats = [{'status': 'pending', 'count': 5}, ...]
{% endcomment %}

<div class="card border-0 shadow-sm">
    <div class="card-header bg-white border-0">
        <h5 class="mb-0">
            <i class="fas fa-wrench text-warning me-2"></i>
            Work Orders by Status
        </h5>
    </div>
    <div class="card-body">
        <canvas id="workordersChart" height="80"></canvas>
    </div>
    <div class="card-footer bg-white border-0">
        <div class="row text-center">
            {% for stat in workorder_stats %}
            <div class="col">
                <span class="badge bg-{{ stat.status|slugify }}-status mb-1">{{ stat.count }}</span>
                <p class="text-muted small mb-0">{{ stat.status|title }}</p>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const ctx = document.getElementById('workordersChart').getContext('2d');
    
    // Chart data from Django context
    const chartData = JSON.parse('{{ workorder_stats|escapejs }}');
    
    const labels = chartData.map(item => item.status.replace('_', ' ').toUpperCase());
    const data = chartData.map(item => item.count);
    
    // Status colors
    const statusColors = {
        'pending': '#f59e0b',
        'in_progress': '#3b82f6',
        'awaiting_parts': '#6366f1',
        'awaiting_approval': '#8b5cf6',
        'completed': '#10b981',
        'cancelled': '#ef4444',
        'on_hold': '#6b7280'
    };
    
    const backgroundColors = chartData.map(item => statusColors[item.status] || '#6b7280');
    
    const workordersChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: labels,
            datasets: [{
                data: data,
                backgroundColor: backgroundColors,
                borderWidth: 2,
                borderColor: '#fff'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: {
                    position: 'bottom',
                    labels: {
                        padding: 15,
                        usePointStyle: true,
                        font: {
                            size: 12
                        }
                    }
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            const total = context.dataset.data.reduce((a, b) => a + b, 0);
                            const percentage = ((context.parsed / total) * 100).toFixed(1);
                            return context.label + ': ' + context.parsed + ' (' + percentage + '%)';
                        }
                    }
                }
            }
        }
    });
    
    // Auto-refresh every 60 seconds
    setInterval(function() {
        fetch('/dashboard/api/workorders/')
            .then(response => response.json())
            .then(data => {
                workordersChart.data.labels = data.map(item => item.status.replace('_', ' ').toUpperCase());
                workordersChart.data.datasets[0].data = data.map(item => item.count);
                workordersChart.update();
            })
            .catch(error => console.error('Error loading work order data:', error));
    }, 60000);
});
</script>

<style scoped>
.badge.bg-pending-status { background-color: #f59e0b !important; }
.badge.bg-in-progress-status { background-color: #3b82f6 !important; }
.badge.bg-awaiting-parts-status { background-color: #6366f1 !important; }
.badge.bg-awaiting-approval-status { background-color: #8b5cf6 !important; }
.badge.bg-completed-status { background-color: #10b981 !important; }
.badge.bg-cancelled-status { background-color: #ef4444 !important; }
.badge.bg-on-hold-status { background-color: #6b7280 !important; }
</style>
