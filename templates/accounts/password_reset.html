{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset - Smart Vehicle Repairs{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-200px)] flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="bg-gradient-to-r from-indigo-600 to-indigo-700 px-8 py-6 text-white text-center">
                <i class="fas fa-key text-4xl mb-3"></i>
                <h2 class="text-2xl font-bold mb-1">Reset Password</h2>
                <p class="text-indigo-100">Enter your email to receive reset instructions</p>
            </div>
            
            <div class="p-8">
                <form method="post">
                    {% csrf_token %}
                    
                    <!-- Email -->
                    <div class="mb-6">
                        <label for="id_email" class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                        <div class="relative">
                            <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400"></i>
                            <input type="email" 
                                   class="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all" 
                                   id="id_email" 
                                   name="email" 
                                   placeholder="your@email.com" 
                                   required 
                                   autofocus>
                        </div>
                        <small class="text-slate-500 text-sm mt-1 block">We'll send password reset instructions to this email</small>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 mb-4">
                        <i class="fas fa-paper-plane mr-2"></i> Send Reset Link
                    </button>
                    
                    <!-- Back to Login -->
                    <div class="text-center">
                        <a href="{% url 'login' %}" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium transition-colors">
                            <i class="fas fa-arrow-left mr-1"></i> Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
