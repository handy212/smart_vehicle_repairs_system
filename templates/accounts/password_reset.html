{% extends 'base.html' %}
{% load static %}

{% block title %}Password Reset - Smart Vehicle Repairs{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 200px);">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-key text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 mb-2">Reset Password</h2>
                        <p class="text-muted">Enter your email to receive reset instructions</p>
                    </div>
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <!-- Email -->
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" 
                                       class="form-control" 
                                       id="id_email" 
                                       name="email" 
                                       placeholder="your@email.com" 
                                       required 
                                       autofocus>
                            </div>
                            <small class="text-muted">We'll send password reset instructions to this email</small>
                        </div>
                        
                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-paper-plane me-2"></i> Send Reset Link
                        </button>
                        
                        <!-- Back to Login -->
                        <div class="text-center">
                            <a href="{% url 'login' %}" class="text-decoration-none">
                                <i class="fas fa-arrow-left me-1"></i> Back to Login
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
