{% extends 'base.html' %}
{% load static %}

{% block title %}Register - Smart Vehicle Repairs{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus text-primary" style="font-size: 3rem;"></i>
                        <h2 class="mt-3 mb-2">Create Account</h2>
                        <p class="text-muted">Registration coming soon! Please contact admin.</p>
                    </div>
                    
                    <div class="text-center">
                        <a href="{% url 'login' %}" class="btn btn-primary">
                            <i class="fas fa-arrow-left me-2"></i> Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
