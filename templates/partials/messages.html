{% if messages %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Convert Django messages to ToastSystem notifications
    {% for message in messages %}
    {% if message.tags == 'success' %}
        if (window.showSuccessToast) {
            window.showSuccessToast('{{ message|escapejs }}');
        } else if (window.ToastSystem) {
            window.ToastSystem.success('{{ message|escapejs }}');
        }
    {% elif message.tags == 'error' or message.tags == 'danger' %}
        if (window.showErrorToast) {
            window.showErrorToast('{{ message|escapejs }}');
        } else if (window.ToastSystem) {
            window.ToastSystem.error('{{ message|escapejs }}');
        }
    {% elif message.tags == 'warning' %}
        if (window.showWarningToast) {
            window.showWarningToast('{{ message|escapejs }}');
        } else if (window.ToastSystem) {
            window.ToastSystem.warning('{{ message|escapejs }}');
        }
    {% elif message.tags == 'info' %}
        if (window.showInfoToast) {
            window.showInfoToast('{{ message|escapejs }}');
        } else if (window.ToastSystem) {
            window.ToastSystem.info('{{ message|escapejs }}');
        }
    {% else %}
        if (window.showInfoToast) {
            window.showInfoToast('{{ message|escapejs }}');
        } else if (window.ToastSystem) {
            window.ToastSystem.info('{{ message|escapejs }}');
        }
    {% endif %}
    {% endfor %}
});
</script>
{% endif %}
