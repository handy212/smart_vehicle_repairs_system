<!-- Notification Dropdown (alternative to bell, shows full notifications) -->
<div class="w-full max-w-md bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden">
    <div class="px-4 py-3 border-b border-slate-200 bg-gradient-to-r from-slate-50 to-white flex justify-between items-center">
        <h6 class="text-sm font-semibold text-slate-900">Recent Notifications</h6>
        <a href="{% url 'notifications:mark-all-as-read' %}" class="text-xs text-primary hover:text-primary/80 font-medium">Mark all read</a>
    </div>
    
    <div class="max-h-96 overflow-y-auto" id="notificationsDropdownList">
        <!-- Notifications will be loaded here via JavaScript -->
        <div class="text-center py-8">
            <div class="inline-block w-6 h-6 border-2 border-primary border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs text-slate-500 mt-2">Loading...</p>
        </div>
    </div>
    
    <div class="px-4 py-3 border-t border-slate-200 bg-gradient-to-r from-slate-50 to-white">
        <a href="{% url 'notifications:notification-center' %}" class="block w-full text-center px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm font-medium">
            View All Notifications
        </a>
    </div>
</div>

<style>
#notificationsDropdownList::-webkit-scrollbar {
    width: 6px;
}

#notificationsDropdownList::-webkit-scrollbar-track {
    background: #f1f1f1;
}

#notificationsDropdownList::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 3px;
}

#notificationsDropdownList::-webkit-scrollbar-thumb:hover {
    background: #555;
}
</style>

<script>
function loadNotificationsDropdown() {
    const list = document.getElementById('notificationsDropdownList');
    
    fetch('{% url "notifications:recent-notifications" %}?limit=10')
        .then(response => response.json())
        .then(data => {
            if (data.notifications.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-12 text-slate-500">
                        <i class="fas fa-bell-slash text-4xl mb-3 block"></i>
                        <p class="text-sm font-medium">No notifications</p>
                    </div>
                `;
            } else {
                let html = '';
                data.notifications.forEach(notification => {
                    const iconClass = getNotificationIcon(notification.notification_type);
                    html += `
                        <div class="px-4 py-3 hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-b-0 cursor-pointer ${!notification.is_read ? 'bg-blue-50/50' : ''}" 
                             onclick="window.location.href='${notification.url}'">
                            <div class="flex items-start gap-3">
                                <div class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center flex-shrink-0">
                                    <i class="fas ${iconClass}"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h6 class="text-sm font-semibold text-slate-900 mb-1">${notification.title}</h6>
                                    <p class="text-xs text-slate-600 mb-2 line-clamp-2">${notification.message}</p>
                                    <div class="flex items-center justify-between">
                                        <small class="text-xs text-slate-500 flex items-center gap-1">
                                            <i class="fas fa-clock"></i>
                                            ${getTimeAgo(notification.created_at)}
                                        </small>
                                        ${!notification.is_read ? '<span class="px-2 py-0.5 bg-primary text-white text-xs font-semibold rounded-full">New</span>' : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            }
        })
        .catch(error => {
            console.error('Error:', error);
            list.innerHTML = `
                <div class="text-center py-12 text-rose-600">
                    <i class="fas fa-exclamation-triangle text-4xl mb-3 block"></i>
                    <p class="text-sm font-medium">Error loading notifications</p>
                </div>
            `;
        });
}

function getNotificationIcon(type) {
    const icons = {
        'appointment': 'fa-calendar',
        'work_order': 'fa-wrench',
        'invoice': 'fa-file-invoice',
        'payment': 'fa-credit-card',
        'inspection': 'fa-clipboard-check',
        'inventory': 'fa-boxes',
        'vehicle': 'fa-car',
        'system': 'fa-bell'
    };
    return icons[type] || 'fa-bell';
}

function getTimeAgo(isoDate) {
    const date = new Date(isoDate);
    const now = new Date();
    const seconds = Math.floor((now - date) / 1000);
    
    if (seconds < 60) return 'Just now';
    if (seconds < 3600) return Math.floor(seconds / 60) + ' minutes ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + ' hours ago';
    return Math.floor(seconds / 86400) + ' days ago';
}

// Load on page load
document.addEventListener('DOMContentLoaded', loadNotificationsDropdown);
</script>
