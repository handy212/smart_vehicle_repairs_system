<div class="notification-item list-group-item {% if not notification.is_read %}unread{% endif %}" 
     data-url="{% url 'notifications:notification-detail' notification.id %}"
     onclick="window.location.href=this.getAttribute('data-url')">
    <div class="d-flex align-items-start">
        <!-- Icon -->
        <div class="notification-icon {{ notification.notification_type }} me-3">
            <i class="fas {% if notification.notification_type == 'appointment' %}fa-calendar
                          {% elif notification.notification_type == 'work_order' %}fa-wrench
                          {% elif notification.notification_type == 'invoice' %}fa-file-invoice
                          {% elif notification.notification_type == 'payment' %}fa-credit-card
                          {% elif notification.notification_type == 'inspection' %}fa-clipboard-check
                          {% elif notification.notification_type == 'inventory' %}fa-boxes
                          {% elif notification.notification_type == 'vehicle' %}fa-car
                          {% else %}fa-bell{% endif %}"></i>
        </div>

        <!-- Content -->
        <div class="flex-grow-1">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h6 class="notification-title mb-1">
                        {% if not notification.is_read %}
                        <span class="notification-badge unread me-2"></span>
                        {% endif %}
                        {{ notification.title }}
                    </h6>
                    <p class="mb-1 text-muted">{{ notification.message|truncatewords:20 }}</p>
                    <small class="text-muted">
                        <i class="fas fa-clock me-1"></i>
                        {{ notification.created_at|timesince }} ago
                    </small>
                </div>
                <div class="text-end">
                    <span class="badge {% if notification.priority == 'urgent' %}bg-danger
                                       {% elif notification.priority == 'high' %}bg-warning
                                       {% elif notification.priority == 'normal' %}bg-info
                                       {% else %}bg-secondary{% endif %}">
                        {{ notification.get_priority_display }}
                    </span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="ms-3">
            <button type="button" class="btn btn-sm btn-outline-danger" 
                    onclick="event.stopPropagation(); deleteNotification('{{ notification.id }}')">
                <i class="fas fa-trash"></i>
            </button>
        </div>
    </div>
</div>
