<div class="p-4 border-b border-slate-200 transition-all cursor-pointer hover:bg-slate-50 {% if not notification.is_read %}bg-blue-50/50 border-l-4 border-l-primary{% endif %}" 
     data-url="{% url 'notifications:notification-detail' notification.id %}"
     onclick="window.location.href=this.getAttribute('data-url')">
    <div class="flex items-start gap-4">
        <!-- Icon -->
        <div class="w-10 h-10 rounded-full flex items-center justify-center flex-shrink-0
            {% if notification.notification_type == 'appointment' %}bg-blue-100 text-blue-600
            {% elif notification.notification_type == 'work_order' %}bg-amber-100 text-amber-600
            {% elif notification.notification_type == 'invoice' %}bg-emerald-100 text-emerald-600
            {% elif notification.notification_type == 'payment' %}bg-rose-100 text-rose-600
            {% elif notification.notification_type == 'inspection' %}bg-purple-100 text-purple-600
            {% elif notification.notification_type == 'inventory' %}bg-teal-100 text-teal-600
            {% else %}bg-slate-100 text-slate-600{% endif %}">
            <i class="fas {% if notification.notification_type == 'appointment' %}fa-calendar
                          {% elif notification.notification_type == 'work_order' %}fa-wrench
                          {% elif notification.notification_type == 'invoice' %}fa-file-invoice
                          {% elif notification.notification_type == 'payment' %}fa-credit-card
                          {% elif notification.notification_type == 'inspection' %}fa-clipboard-check
                          {% elif notification.notification_type == 'inventory' %}fa-boxes
                          {% elif notification.notification_type == 'vehicle' %}fa-car
                          {% else %}fa-bell{% endif %} text-sm"></i>
        </div>

        <!-- Content -->
        <div class="flex-1 min-w-0">
            <div class="flex justify-between items-start gap-4">
                <div class="flex-1 min-w-0">
                    <h6 class="text-sm font-semibold text-slate-900 mb-1 flex items-center gap-2">
                        {% if not notification.is_read %}
                        <span class="w-2 h-2 rounded-full bg-primary"></span>
                        {% endif %}
                        {{ notification.title }}
                    </h6>
                    <p class="text-sm text-slate-600 mb-2 line-clamp-2">{{ notification.message|truncatewords:20 }}</p>
                    <div class="flex items-center gap-2 text-xs text-slate-500">
                        <i class="fas fa-clock"></i>
                        <span>{{ notification.created_at|timesince }} ago</span>
                    </div>
                </div>
                <div class="flex items-start gap-2 flex-shrink-0">
                    <span class="inline-flex items-center px-2 py-1 rounded-full text-xs font-semibold
                        {% if notification.priority == 'urgent' %}bg-rose-50 text-rose-700 border border-rose-200
                        {% elif notification.priority == 'high' %}bg-amber-50 text-amber-700 border border-amber-200
                        {% elif notification.priority == 'normal' %}bg-blue-50 text-blue-700 border border-blue-200
                        {% else %}bg-slate-50 text-slate-700 border border-slate-200{% endif %}">
                        {{ notification.get_priority_display }}
                    </span>
                    <button type="button" class="p-1.5 text-rose-600 hover:bg-rose-50 rounded-lg transition-colors" 
                            onclick="event.stopPropagation(); deleteNotification('{{ notification.id }}')">
                        <i class="fas fa-trash text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
