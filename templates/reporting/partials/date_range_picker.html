<div class="bg-white rounded-xl border border-slate-200 shadow-sm mb-6 overflow-hidden">
    <div class="p-6">
        <form method="get" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
            <div class="sm:col-span-2 lg:col-span-1">
                <label class="block text-xs font-semibold text-slate-700 mb-2">Date Range</label>
                <select class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" 
                        id="dateRangePreset" onchange="setDateRange(this.value)">
                    <option value="custom">Custom Range</option>
                    <option value="today">Today</option>
                    <option value="yesterday">Yesterday</option>
                    <option value="last7">Last 7 Days</option>
                    <option value="last30" selected>Last 30 Days</option>
                    <option value="thisMonth">This Month</option>
                    <option value="lastMonth">Last Month</option>
                    <option value="thisQuarter">This Quarter</option>
                    <option value="thisYear">This Year</option>
                    <option value="lastYear">Last Year</option>
                </select>
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-700 mb-2">Start Date</label>
                <input type="date" 
                       class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" 
                       name="start_date" 
                       id="startDate"
                       value="{{ start_date|default:'' }}">
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-700 mb-2">End Date</label>
                <input type="date" 
                       class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary focus:border-primary" 
                       name="end_date" 
                       id="endDate"
                       value="{{ end_date|default:'' }}">
            </div>
            
            <div>
                <button type="submit" class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 bg-primary text-white rounded-lg text-sm font-medium hover:bg-primary/90 transition-colors">
                    <i class="fas fa-filter"></i>
                    <span>Apply</span>
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function setDateRange(preset) {
    const today = new Date();
    let startDate, endDate = today;
    
    switch(preset) {
        case 'today':
            startDate = today;
            break;
        case 'yesterday':
            startDate = new Date(today);
            startDate.setDate(today.getDate() - 1);
            endDate = startDate;
            break;
        case 'last7':
            startDate = new Date(today);
            startDate.setDate(today.getDate() - 7);
            break;
        case 'last30':
            startDate = new Date(today);
            startDate.setDate(today.getDate() - 30);
            break;
        case 'thisMonth':
            startDate = new Date(today.getFullYear(), today.getMonth(), 1);
            break;
        case 'lastMonth':
            startDate = new Date(today.getFullYear(), today.getMonth() - 1, 1);
            endDate = new Date(today.getFullYear(), today.getMonth(), 0);
            break;
        case 'thisQuarter':
            const quarter = Math.floor(today.getMonth() / 3);
            startDate = new Date(today.getFullYear(), quarter * 3, 1);
            break;
        case 'thisYear':
            startDate = new Date(today.getFullYear(), 0, 1);
            break;
        case 'lastYear':
            startDate = new Date(today.getFullYear() - 1, 0, 1);
            endDate = new Date(today.getFullYear() - 1, 11, 31);
            break;
        default:
            return;
    }
    
    if (preset !== 'custom') {
        document.getElementById('startDate').value = formatDate(startDate);
        document.getElementById('endDate').value = formatDate(endDate);
    }
}

function formatDate(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

// Set initial date range on page load
document.addEventListener('DOMContentLoaded', function() {
    if (!document.getElementById('startDate').value) {
        setDateRange('last30');
    }
});
</script>
