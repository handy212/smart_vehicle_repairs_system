<div class="btn-group">
    <button type="button" class="btn btn-outline-secondary dropdown-toggle" data-bs-toggle="dropdown">
        <i class="fas fa-download me-1"></i>Export
    </button>
    <ul class="dropdown-menu dropdown-menu-end">
        <li>
            <a class="dropdown-item" href="#" onclick="exportToPDF()">
                <i class="fas fa-file-pdf text-danger me-2"></i>Export to PDF
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="#" onclick="exportToExcel()">
                <i class="fas fa-file-excel text-success me-2"></i>Export to Excel
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="#" onclick="exportToCSV()">
                <i class="fas fa-file-csv text-info me-2"></i>Export to CSV
            </a>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
            <a class="dropdown-item" href="#" onclick="printReport()">
                <i class="fas fa-print me-2"></i>Print Report
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#emailReportModal">
                <i class="fas fa-envelope me-2"></i>Email Report
            </a>
        </li>
        <li><hr class="dropdown-divider"></li>
        <li>
            <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#saveReportModal">
                <i class="fas fa-bookmark me-2"></i>Save Report
            </a>
        </li>
        <li>
            <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#scheduleReportModal">
                <i class="fas fa-clock me-2"></i>Schedule Report
            </a>
        </li>
    </ul>
</div>

<!-- Email Report Modal -->
<div class="modal fade" id="emailReportModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Email Report</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="emailReportForm">
                    <div class="mb-3">
                        <label class="form-label">Email Address(es)</label>
                        <input type="text" 
                               class="form-control" 
                               name="email_recipients" 
                               placeholder="email1@example.com, email2@example.com"
                               required>
                        <small class="text-muted">Separate multiple emails with commas</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <input type="text" 
                               class="form-control" 
                               name="subject" 
                               value="Report from Smart Vehicle Repairs">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message (Optional)</label>
                        <textarea class="form-control" 
                                  name="message" 
                                  rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="sendEmailReport()">
                    <i class="fas fa-paper-plane me-1"></i>Send
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Save Report Modal -->
<div class="modal fade" id="saveReportModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Save Report</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="saveReportForm">
                    <div class="mb-3">
                        <label class="form-label">Report Name</label>
                        <input type="text" 
                               class="form-control" 
                               name="report_name" 
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" 
                                  name="description" 
                                  rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" 
                                   type="checkbox" 
                                   name="is_public" 
                                   id="isPublic">
                            <label class="form-check-label" for="isPublic">
                                Share with all users
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveReport()">
                    <i class="fas fa-save me-1"></i>Save
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function exportToPDF() {
    window.print();
}

function exportToExcel() {
    const url = window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'export=excel';
    window.location.href = url;
}

function exportToCSV() {
    const url = window.location.href + (window.location.href.includes('?') ? '&' : '?') + 'export=csv';
    window.location.href = url;
}

function printReport() {
    window.print();
}

function sendEmailReport() {
    const form = document.getElementById('emailReportForm');
    const formData = new FormData(form);
    
    // Add current report parameters
    const params = new URLSearchParams(window.location.search);
    formData.append('report_url', window.location.href);
    
    fetch('/reporting/email-report/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Report sent successfully!');
            bootstrap.Modal.getInstance(document.getElementById('emailReportModal')).hide();
        } else {
            alert('Error sending report: ' + data.error);
        }
    });
}

function saveReport() {
    const form = document.getElementById('saveReportForm');
    const formData = new FormData(form);
    
    // Add current report parameters
    formData.append('report_url', window.location.href);
    formData.append('report_type', document.querySelector('[data-report-type]')?.dataset.reportType || 'custom');
    
    fetch('/reporting/save-report/', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Report saved successfully!');
            bootstrap.Modal.getInstance(document.getElementById('saveReportModal')).hide();
        } else {
            alert('Error saving report: ' + data.error);
        }
    });
}
</script>
