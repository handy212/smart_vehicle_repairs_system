<!-- Vehicle Damage Marker Component -->
<div class="vehicle-damage-marker">
    <div class="bg-white rounded-xl border border-amber-200 shadow-sm overflow-hidden">
        <div class="px-4 py-3 bg-gradient-to-r from-amber-50 to-amber-100 border-b border-amber-200">
            <h6 class="text-sm font-semibold text-slate-900 flex items-center gap-2">
                <i class="fas fa-car-crash text-amber-600"></i>
                Vehicle Damage Assessment
                <span class="text-xs font-normal text-slate-600 ml-2">Click on vehicle diagram to mark damage</span>
            </h6>
        </div>
        <div class="p-4">
            <!-- Damage Type Selector -->
            <div class="bg-slate-50 rounded-lg p-3 mb-4">
                <div class="flex flex-wrap items-center gap-2">
                    <input type="radio" class="sr-only peer" name="damageType" id="scratch" value="scratch" checked>
                    <label class="inline-flex items-center gap-1 px-3 py-1.5 border-2 border-amber-300 text-amber-700 rounded-lg hover:bg-amber-50 cursor-pointer transition-colors peer-checked:bg-amber-100 peer-checked:border-amber-500" for="scratch">
                        <i class="fas fa-exclamation-triangle text-xs"></i>
                        Scratch
                    </label>
                    
                    <input type="radio" class="sr-only peer" name="damageType" id="dent" value="dent">
                    <label class="inline-flex items-center gap-1 px-3 py-1.5 border-2 border-rose-300 text-rose-700 rounded-lg hover:bg-rose-50 cursor-pointer transition-colors peer-checked:bg-rose-100 peer-checked:border-rose-500" for="dent">
                        <i class="fas fa-circle text-xs"></i>
                        Dent
                    </label>
                    
                    <input type="radio" class="sr-only peer" name="damageType" id="rust" value="rust">
                    <label class="inline-flex items-center gap-1 px-3 py-1.5 border-2 border-slate-400 text-slate-700 rounded-lg hover:bg-slate-100 cursor-pointer transition-colors peer-checked:bg-slate-200 peer-checked:border-slate-500" for="rust">
                        <i class="fas fa-circle-notch text-xs"></i>
                        Rust
                    </label>
                    
                    <input type="radio" class="sr-only peer" name="damageType" id="crack" value="crack">
                    <label class="inline-flex items-center gap-1 px-3 py-1.5 border-2 border-blue-300 text-blue-700 rounded-lg hover:bg-blue-50 cursor-pointer transition-colors peer-checked:bg-blue-100 peer-checked:border-blue-500" for="crack">
                        <i class="fas fa-bolt text-xs"></i>
                        Crack
                    </label>
                    
                    <button type="button" class="ml-auto px-3 py-1.5 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-100 transition-colors text-sm font-medium" id="clearDamage">
                        <i class="fas fa-eraser mr-1"></i>Clear All
                    </button>
                </div>
            </div>
            
            <!-- Vehicle Diagram Container -->
            <div class="relative">
                <div class="text-center mb-3">
                    <p class="text-xs text-slate-500">Click on the vehicle diagram to mark damage locations</p>
                </div>
                
                <!-- SVG Container -->
                <div id="vehicleDiagram" class="bg-white border-2 border-slate-200 rounded-lg p-4 max-w-full mx-auto">
                    <!-- SVG will be loaded here -->
                </div>
                
                <!-- Damage Legend -->
                <div class="mt-4 grid grid-cols-4 gap-2 text-xs">
                    <div class="flex items-center gap-1">
                        <span class="w-3 h-3 rounded-full bg-amber-500 border-2 border-white shadow-sm"></span>
                        <span class="text-slate-600">Scratch</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="w-3 h-3 rounded-full bg-rose-600 border-2 border-white shadow-sm"></span>
                        <span class="text-slate-600">Dent</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="w-3 h-3 rounded-full bg-slate-600 border-2 border-white shadow-sm"></span>
                        <span class="text-slate-600">Rust</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="w-3 h-3 rounded-full bg-blue-500 border-2 border-white shadow-sm"></span>
                        <span class="text-slate-600">Crack</span>
                    </div>
                </div>
            </div>
            
            <!-- Damage List -->
            <div class="mt-4 hidden" id="damageList">
                <h6 class="text-sm font-semibold text-slate-700 mb-2">Recorded Damage:</h6>
                <div class="damage-items space-y-2"></div>
            </div>
            
            <!-- Hidden input to store damage data -->
            <input type="hidden" name="vehicle_damage" id="vehicleDamageData" value="">
        </div>
    </div>
</div>

<style>
.vehicle-svg-container svg {
    width: 100%;
    height: auto;
    max-width: 800px;
    cursor: crosshair;
}

.damage-marker {
    cursor: pointer;
    transition: all 0.2s;
}

.damage-marker:hover {
    transform: scale(1.2);
}

.damage-item {
    background: #f8f9fa;
    padding: 0.5rem;
    margin-bottom: 0.5rem;
    border-radius: 0.25rem;
    border-left: 4px solid;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>

<script>
// Vehicle Damage Marker JavaScript
// (Keep existing JavaScript functionality)
document.addEventListener('DOMContentLoaded', function() {
    // Load vehicle SVG
    fetch('/static/images/vehicle-diagram.svg')
        .then(response => response.text())
        .then(svgText => {
            const container = document.getElementById('vehicleDiagram');
            container.innerHTML = svgText;
            
            const svg = container.querySelector('svg');
            if (svg) {
                svg.style.width = '100%';
                svg.style.height = 'auto';
                
                // Initialize damage markers
                const damageData = [];
                
                svg.addEventListener('click', function(e) {
                    const rect = svg.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    
                    const damageType = document.querySelector('input[name="damageType"]:checked').value;
                    
                    // Add marker to SVG
                    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    marker.setAttribute('cx', `${x}%`);
                    marker.setAttribute('cy', `${y}%`);
                    marker.setAttribute('r', '8');
                    marker.setAttribute('stroke', 'white');
                    marker.setAttribute('stroke-width', '2');
                    marker.classList.add('damage-marker');
                    
                    const colors = {
                        scratch: '#f59e0b',
                        dent: '#dc2626',
                        rust: '#475569',
                        crack: '#3b82f6'
                    };
                    marker.setAttribute('fill', colors[damageType] || '#6c757d');
                    
                    const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                    title.textContent = damageType.charAt(0).toUpperCase() + damageType.slice(1);
                    marker.appendChild(title);
                    
                    svg.appendChild(marker);
                    
                    // Store damage data
                    damageData.push({ x, y, type: damageType });
                    updateDamageData();
                    updateDamageList();
                });
                
                // Clear all damage
                document.getElementById('clearDamage').addEventListener('click', function() {
                    const markers = svg.querySelectorAll('.damage-marker');
                    markers.forEach(marker => marker.remove());
                    damageData.length = 0;
                    updateDamageData();
                    updateDamageList();
                });
                
                function updateDamageData() {
                    document.getElementById('vehicleDamageData').value = JSON.stringify(damageData);
                }
                
                function updateDamageList() {
                    const list = document.getElementById('damageList');
                    const items = list.querySelector('.damage-items');
                    
                    if (damageData.length > 0) {
                        list.classList.remove('hidden');
                        items.innerHTML = '';
                        damageData.forEach((damage, index) => {
                            const item = document.createElement('div');
                            item.className = 'flex items-center justify-between p-2 bg-slate-50 rounded-lg border-l-4';
                            item.style.borderLeftColor = {
                                scratch: '#f59e0b',
                                dent: '#dc2626',
                                rust: '#475569',
                                crack: '#3b82f6'
                            }[damage.type] || '#6c757d';
                            item.innerHTML = `
                                <span class="text-sm text-slate-700">${damage.type.charAt(0).toUpperCase() + damage.type.slice(1)} at ${damage.x.toFixed(1)}%, ${damage.y.toFixed(1)}%</span>
                                <button type="button" class="text-rose-600 hover:text-rose-700" onclick="removeDamage(${index})">
                                    <i class="fas fa-times"></i>
                                </button>
                            `;
                            items.appendChild(item);
                        });
                    } else {
                        list.classList.add('hidden');
                    }
                }
                
                // Make functions available globally
                window.vehicleDamageMarker = {
                    loadDamageData: function(data) {
                        damageData.length = 0;
                        data.forEach(damage => {
                            damageData.push(damage);
                            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                            marker.setAttribute('cx', `${damage.x}%`);
                            marker.setAttribute('cy', `${damage.y}%`);
                            marker.setAttribute('r', '8');
                            marker.setAttribute('stroke', 'white');
                            marker.setAttribute('stroke-width', '2');
                            marker.classList.add('damage-marker');
                            
                            const colors = {
                                scratch: '#f59e0b',
                                dent: '#dc2626',
                                rust: '#475569',
                                crack: '#3b82f6'
                            };
                            marker.setAttribute('fill', colors[damage.type] || '#6c757d');
                            
                            const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                            title.textContent = damage.type.charAt(0).toUpperCase() + damage.type.slice(1);
                            marker.appendChild(title);
                            
                            svg.appendChild(marker);
                        });
                        updateDamageData();
                        updateDamageList();
                    }
                };
                
                window.removeDamage = function(index) {
                    damageData.splice(index, 1);
                    const markers = svg.querySelectorAll('.damage-marker');
                    markers[index].remove();
                    updateDamageData();
                    updateDamageList();
                };
            }
        })
        .catch(error => {
            console.error('Error loading vehicle SVG:', error);
        });
});
</script>
