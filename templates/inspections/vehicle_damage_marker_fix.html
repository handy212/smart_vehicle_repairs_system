<!-- Vehicle Damage Marker Component -->
<div class="vehicle-damage-marker">
    <div class="card">
        <div class="card-header bg-warning text-dark">
            <h6 class="mb-0">
                <i class="fas fa-car-crash me-2"></i>Vehicle Damage Assessment
                <small class="text-muted ms-2">Click on vehicle diagram to mark damage</small>
            </h6>
        </div>
        <div class="card-body p-3">
            <!-- Damage Type Selector -->
            <div class="damage-controls mb-3">
                <div class="btn-group" role="group" aria-label="Damage Type">
                    <input type="radio" class="btn-check" name="damageType" id="scratch" value="scratch" checked>
                    <label class="btn btn-outline-warning btn-sm" for="scratch">
                        <i class="fas fa-exclamation-triangle me-1"></i>Scratch
                    </label>
                    
                    <input type="radio" class="btn-check" name="damageType" id="dent" value="dent">
                    <label class="btn btn-outline-danger btn-sm" for="dent">
                        <i class="fas fa-circle me-1"></i>Dent
                    </label>
                    
                    <input type="radio" class="btn-check" name="damageType" id="rust" value="rust">
                    <label class="btn btn-outline-dark btn-sm" for="rust">
                        <i class="fas fa-circle-notch me-1"></i>Rust
                    </label>
                    
                    <input type="radio" class="btn-check" name="damageType" id="crack" value="crack">
                    <label class="btn btn-outline-info btn-sm" for="crack">
                        <i class="fas fa-bolt me-1"></i>Crack
                    </label>
                </div>
                
                <button type="button" class="btn btn-outline-secondary btn-sm ms-2" id="clearDamage">
                    <i class="fas fa-eraser me-1"></i>Clear All
                </button>
            </div>
            
            <!-- Vehicle Diagram Container -->
            <div class="vehicle-diagram-container position-relative">
                <div class="text-center mb-2">
                    <small class="text-muted">Click on the vehicle diagram to mark damage locations</small>
                </div>
                
                <!-- SVG Container -->
                <div id="vehicleDiagram" class="vehicle-svg-container">
                    <!-- SVG will be loaded here -->
                </div>
                
                <!-- Damage Legend -->
                <div class="damage-legend mt-3">
                    <div class="row">
                        <div class="col-3">
                            <span class="damage-dot scratch-marker me-1"></span>
                            <small>Scratch</small>
                        </div>
                        <div class="col-3">
                            <span class="damage-dot dent-marker me-1"></span>
                            <small>Dent</small>
                        </div>
                        <div class="col-3">
                            <span class="damage-dot rust-marker me-1"></span>
                            <small>Rust</small>
                        </div>
                        <div class="col-3">
                            <span class="damage-dot crack-marker me-1"></span>
                            <small>Crack</small>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Damage List -->
            <div class="damage-list mt-3" id="damageList" style="display: none;">
                <h6 class="text-muted">Recorded Damage:</h6>
                <div class="damage-items"></div>
            </div>
            
            <!-- Hidden input to store damage data -->
            <input type="hidden" name="vehicle_damage" id="vehicleDamageData" value="">
        </div>
    </div>
</div>

<style>
.vehicle-damage-marker .damage-controls {
    background: #f8f9fa;
    padding: 0.75rem;
    border-radius: 0.375rem;
}

.vehicle-svg-container {
    background: white;
    border: 2px solid #e9ecef;
    border-radius: 0.5rem;
    padding: 1rem;
    max-width: 100%;
    margin: 0 auto;
}

.vehicle-diagram-container {
    max-width: 100%;
    height: auto;
    position: relative;
}

.vehicle-damage-marker svg {
    width: 100%;
    height: auto;
    max-height: 400px;
}

.damage-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    vertical-align: middle;
}

.scratch-marker { background-color: orange; }
.dent-marker { background-color: red; }
.rust-marker { background-color: #6c757d; }
.crack-marker { background-color: #17a2b8; }

.damage-marker {
    position: absolute;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    border: 2px solid white;
    box-shadow: 0 0 3px rgba(0,0,0,0.5);
}

.damage-marker.scratch-marker { background-color: orange; }
.damage-marker.dent-marker { background-color: red; }
.damage-marker.rust-marker { background-color: #6c757d; }
.damage-marker.crack-marker { background-color: #17a2b8; }

.damage-items {
    max-height: 150px;
    overflow-y: auto;
    font-size: 0.9rem;
}

.damage-item {
    padding: 0.25rem 0.5rem;
    background: #f8f9fa;
    border-radius: 0.25rem;
    margin-bottom: 0.25rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.damage-item button {
    padding: 0;
    background: none;
    border: none;
    color: #dc3545;
    font-size: 0.8rem;
}
</style>

<script>
class VehicleDamageMarker {
    constructor() {
        this.damages = [];
        this.damageCounter = 0;
        this.selectedDamageType = 'scratch'; // Default damage type
        
        this.loadSVG();
        this.bindEvents();
    }
    
    loadSVG() {
        fetch('/static/images/vehicle-diagram.svg')
            .then(response => response.text())
            .then(svg => {
                document.getElementById('vehicleDiagram').innerHTML = svg;
                
                // Add click event to SVG
                document.querySelector('#vehicleDiagram svg').addEventListener('click', (e) => {
                    this.handleSVGClick(e);
                });
                
                // Load existing damage data if we're editing an inspection
                {% if inspection and inspection.vehicle_damage %}
                this.loadDamageData({{ inspection.vehicle_damage|safe }});
                {% endif %}
            })
            .catch(error => {
                console.error('Error loading vehicle SVG:', error);
                document.getElementById('vehicleDiagram').innerHTML = 
                    '<div class="alert alert-warning">Unable to load vehicle diagram</div>';
            });
    }
    
    bindEvents() {
        // Damage type selection
        document.querySelectorAll('input[name="damageType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                this.selectedDamageType = e.target.value;
            });
        });
        
        // Clear all damage
        document.getElementById('clearDamage').addEventListener('click', () => {
            this.clearAllDamage();
        });
    }
    
    handleSVGClick(e) {
        const svg = e.currentTarget;
        const rect = svg.getBoundingClientRect();
        
        // Calculate relative position within SVG
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        
        this.addDamage(x, y, this.selectedDamageType);
    }
    
    addDamage(x, y, type) {
        const damage = {
            id: ++this.damageCounter,
            x: x,
            y: y,
            type: type,
            timestamp: new Date().toISOString()
        };
        
        this.damages.push(damage);
        this.renderDamageMarker(damage);
        this.updateDamageList();
        this.updateHiddenInput();
    }
    
    renderDamageMarker(damage) {
        const svg = document.querySelector('#vehicleDiagram svg');
        if (!svg) return;
        
        // Create damage marker
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        marker.setAttribute('cx', `${damage.x}%`);
        marker.setAttribute('cy', `${damage.y}%`);
        marker.setAttribute('r', '8');
        marker.setAttribute('class', `damage-marker ${damage.type}-marker`);
        marker.setAttribute('data-damage-id', damage.id);
        marker.setAttribute('stroke', 'white');
        marker.setAttribute('stroke-width', '2');
        
        // Set fill color based on damage type
        const colors = {
            scratch: '#ffc107',
            dent: '#dc3545',
            rust: '#6c757d',
            crack: '#0dcaf0'
        };
        marker.setAttribute('fill', colors[damage.type]);
        
        // Add click event to remove
        marker.addEventListener('click', (e) => {
            e.stopPropagation();
            this.removeDamage(damage.id);
        });
        
        // Add tooltip
        const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
        title.textContent = `${damage.type.charAt(0).toUpperCase() + damage.type.slice(1)} - Click to remove`;
        marker.appendChild(title);
        
        svg.appendChild(marker);
    }
    
    removeDamage(damageId) {
        // Remove from array
        this.damages = this.damages.filter(d => d.id !== damageId);
        
        // Remove SVG marker
        const marker = document.querySelector(`[data-damage-id="${damageId}"]`);
        if (marker) {
            marker.remove();
        }
        
        this.updateDamageList();
        this.updateHiddenInput();
    }
    
    clearAllDamage() {
        this.damages = [];
        
        // Remove all markers from SVG
        document.querySelectorAll('.damage-marker').forEach(marker => {
            marker.remove();
        });
        
        this.updateDamageList();
        this.updateHiddenInput();
    }
    
    updateDamageList() {
        const listContainer = document.getElementById('damageList');
        const itemsContainer = listContainer.querySelector('.damage-items');
        
        if (this.damages.length === 0) {
            listContainer.style.display = 'none';
            return;
        }
        
        listContainer.style.display = 'block';
        itemsContainer.innerHTML = '';
        
        this.damages.forEach(damage => {
            const item = document.createElement('div');
            item.className = `damage-item ${damage.type}`;
            item.innerHTML = `
                <div>
                    <strong>${damage.type.charAt(0).toUpperCase() + damage.type.slice(1)}</strong>
                    <small class="text-muted ms-2">Position: ${damage.x.toFixed(1)}%, ${damage.y.toFixed(1)}%</small>
                </div>
                <span class="remove-damage" onclick="vehicleDamageMarker.removeDamage(${damage.id})">
                    <i class="fas fa-times"></i>
                </span>
            `;
            itemsContainer.appendChild(item);
        });
    }
    
    updateHiddenInput() {
        document.getElementById('vehicleDamageData').value = JSON.stringify(this.damages);
    }
    
    loadDamageData(damageData) {
        if (!damageData) return;
        
        try {
            const damages = typeof damageData === 'string' ? JSON.parse(damageData) : damageData;
            this.damages = damages;
            this.damageCounter = Math.max(...damages.map(d => d.id || 0), 0);
            
            // Wait for SVG to load, then render markers
            setTimeout(() => {
                damages.forEach(damage => {
                    this.renderDamageMarker(damage);
                });
                this.updateDamageList();
                this.updateHiddenInput();
            }, 500);
        } catch (error) {
            console.error('Error loading damage data:', error);
        }
    }
}

// Initialize when DOM is ready
document.addEventListener('DOMContentLoaded', function() {
    window.vehicleDamageMarker = new VehicleDamageMarker();
});
</script>
