<div class="mb-4">
    <div class="mb-3">
        <label class="block text-sm font-semibold text-slate-700 mb-2">Upload Photos</label>
        <input type="file" 
               class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all file:mr-4 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-medium file:bg-primary/10 file:text-primary hover:file:bg-primary/20" 
               id="photoUpload" 
               name="photos" 
               multiple 
               accept="image/*"
               capture="environment">
        <p class="text-xs text-slate-500 mt-1">You can select multiple photos. Images will be automatically compressed.</p>
    </div>
    
    <!-- Photo Preview Grid -->
    <div id="photoPreviewGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 mt-4"></div>
</div>

<script>
document.getElementById('photoUpload').addEventListener('change', function(e) {
    const files = e.target.files;
    const previewGrid = document.getElementById('photoPreviewGrid');
    
    Array.from(files).forEach((file, index) => {
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            
            reader.onload = function(event) {
                // Compress image
                compressImage(event.target.result, file.name, function(compressedDataUrl) {
                    // Create preview
                    const previewItem = document.createElement('div');
                    previewItem.className = 'relative aspect-square rounded-lg overflow-hidden border-2 border-slate-200 hover:border-primary transition-colors';
                    previewItem.innerHTML = `
                        <img src="${compressedDataUrl}" alt="${file.name}" class="absolute inset-0 w-full h-full object-cover">
                        <button type="button" class="absolute top-2 right-2 w-6 h-6 bg-rose-600/90 hover:bg-rose-700 text-white rounded-full flex items-center justify-center cursor-pointer transition-colors" onclick="removePhoto(this)">
                            <i class="fas fa-times text-xs"></i>
                        </button>
                        <input type="text" 
                               class="absolute bottom-0 left-0 right-0 px-2 py-1 bg-black/70 text-white text-xs placeholder:text-white/70 border-0 focus:ring-0" 
                               placeholder="Caption (optional)"
                               name="photo_caption_${index}">
                    `;
                    previewGrid.appendChild(previewItem);
                });
            };
            
            reader.readAsDataURL(file);
        }
    });
});

function compressImage(dataUrl, fileName, callback) {
    const img = new Image();
    img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // Max dimensions
        const MAX_WIDTH = 1200;
        const MAX_HEIGHT = 1200;
        
        let width = img.width;
        let height = img.height;
        
        // Calculate new dimensions
        if (width > height) {
            if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
            }
        } else {
            if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
            }
        }
        
        canvas.width = width;
        canvas.height = height;
        
        // Draw compressed image
        ctx.drawImage(img, 0, 0, width, height);
        
        // Convert to compressed data URL
        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
        callback(compressedDataUrl);
    };
    img.src = dataUrl;
}

function removePhoto(button) {
    const previewItem = button.closest('.relative');
    previewItem.remove();
}
</script>
