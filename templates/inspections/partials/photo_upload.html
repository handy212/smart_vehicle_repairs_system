<div class="photo-upload-container">
    <div class="mb-3">
        <label class="form-label">Upload Photos</label>
        <input type="file" 
               class="form-control" 
               id="photoUpload" 
               name="photos" 
               multiple 
               accept="image/*"
               capture="environment">
        <small class="text-muted">You can select multiple photos. Images will be automatically compressed.</small>
    </div>
    
    <!-- Photo Preview Grid -->
    <div id="photoPreviewGrid" class="photo-preview-grid"></div>
</div>

<style>
.photo-preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 1rem;
    margin-top: 1rem;
}
.photo-preview-item {
    position: relative;
    padding-top: 100%;
    border-radius: 0.5rem;
    overflow: hidden;
    border: 2px solid #dee2e6;
}
.photo-preview-item img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.photo-preview-item .remove-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    background: rgba(239, 68, 68, 0.9);
    color: white;
    border: none;
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 12px;
}
.photo-preview-item .photo-caption {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 5px;
    font-size: 11px;
}
</style>

<script>
document.getElementById('photoUpload').addEventListener('change', function(e) {
    const files = e.target.files;
    const previewGrid = document.getElementById('photoPreviewGrid');
    
    Array.from(files).forEach((file, index) => {
        if (file.type.startsWith('image/')) {
            const reader = new FileReader();
            
            reader.onload = function(event) {
                // Compress image
                compressImage(event.target.result, file.name, function(compressedDataUrl) {
                    // Create preview
                    const previewItem = document.createElement('div');
                    previewItem.className = 'photo-preview-item';
                    previewItem.innerHTML = `
                        <img src="${compressedDataUrl}" alt="${file.name}">
                        <button type="button" class="remove-btn" onclick="removePhoto(this)">
                            <i class="fas fa-times"></i>
                        </button>
                        <input type="text" 
                               class="form-control form-control-sm photo-caption" 
                               placeholder="Caption (optional)"
                               name="photo_caption_${index}">
                    `;
                    previewGrid.appendChild(previewItem);
                });
            };
            
            reader.readAsDataURL(file);
        }
    });
});

function compressImage(dataUrl, fileName, callback) {
    const img = new Image();
    img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        // Max dimensions
        const MAX_WIDTH = 1200;
        const MAX_HEIGHT = 1200;
        
        let width = img.width;
        let height = img.height;
        
        // Calculate new dimensions
        if (width > height) {
            if (width > MAX_WIDTH) {
                height *= MAX_WIDTH / width;
                width = MAX_WIDTH;
            }
        } else {
            if (height > MAX_HEIGHT) {
                width *= MAX_HEIGHT / height;
                height = MAX_HEIGHT;
            }
        }
        
        canvas.width = width;
        canvas.height = height;
        
        // Draw compressed image
        ctx.drawImage(img, 0, 0, width, height);
        
        // Convert to compressed data URL
        const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.8);
        callback(compressedDataUrl);
    };
    img.src = dataUrl;
}

function removePhoto(button) {
    const previewItem = button.closest('.photo-preview-item');
    previewItem.remove();
}
</script>
