# Bare-metal internal Nginx when TLS is terminated by Nginx Proxy Manager (NPM).
# NPM forwards HTTP to this host on port 80 and should send X-Forwarded-Proto: https.
#
# NPM setup (recommended): forward https://workshop.aapgh.com -> http://<this-server-ip>:80
# If NPM forwards directly to app ports instead, Gunicorn (:8000) and Next.js (:3000) must
# listen on 0.0.0.0 (see deploy/setup-services.sh).
# Install: sudo cp deploy/nginx/workshop.aapgh.com.http-npm.conf /etc/nginx/sites-available/workshop.aapgh.com
#          sudo ln -sf /etc/nginx/sites-available/workshop.aapgh.com /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      https;
}

server {
  listen 80;
  listen [::]:80;

  server_name workshop.aapgh.com;

  client_max_body_size 50m;

  # Next.js BFF auth routes — must hit Next.js, not Django (see frontend/proxy.ts)
  location ~ ^/api/auth/(login|logout|refresh|session|verify)$ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
  }

  location /admin/ {
    proxy_pass http://127.0.0.1:8000/admin/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
  }

  location ~ ^/static/(admin|rest_framework)/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
  }

  # Branding is public; other /media/* is auth-gated by Django ProtectedMediaView.
  location /media/ {
    proxy_pass http://127.0.0.1:8000/media/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Authorization $http_authorization;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
