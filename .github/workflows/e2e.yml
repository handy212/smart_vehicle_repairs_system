name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: vehicle_repairs_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d vehicle_repairs_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_ENVIRONMENT: development
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: e2e-ci-secret-key
      DEBUG: 'True'
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://ci:ci@localhost:5432/vehicle_repairs_e2e
      E2E_EMAIL: e2e_admin@example.com
      E2E_PASSWORD: e2e_test_pass_123
      E2E_BASE_URL: http://127.0.0.1:3000
      E2E_API_URL: http://127.0.0.1:8000/api
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Prepare database and E2E user
        run: |
          python manage.py migrate --noinput
          python manage.py init_permissions
          python scripts/create_e2e_user.py

      - name: Start Django
        run: |
          python manage.py runserver 127.0.0.1:8000 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/api/health/ && break
            sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend and Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build and start Next.js
        working-directory: frontend
        run: |
          npm run build
          npm run start -- -p 3000 &
          for i in $(seq 1 45); do
            curl -sf http://127.0.0.1:3000/login && break
            sleep 2
          done

      - name: Run Playwright
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
