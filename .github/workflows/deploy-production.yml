name: Deploy production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (tag or branch)'
        required: true
        default: 'main'
      skip_tests:
        description: 'Skip test gate (emergency only)'
        required: false
        default: false
        type: boolean

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    if: ${{ inputs.skip_tests != true }}

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: vehicle_repairs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d vehicle_repairs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql://ci:ci@localhost:5432/vehicle_repairs_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/validate_celery_beat.py
      - run: pytest -c pytest.ci.ini -q

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [validate]
    if: ${{ always() && (inputs.skip_tests || needs.validate.result == 'success') }}

    steps:
      - name: Check deploy secrets
        id: secrets
        run: |
          if [[ -z "${{ secrets.DEPLOY_HOST }}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_HOST not set — manual deploy required on production server."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Deploy over SSH
        if: steps.secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH || '/opt/smart_vehicle_repairs_system' }}
            git fetch --tags
            git checkout ${{ inputs.ref }}
            bash scripts/validate-env.sh .env
            bash deploy/release.sh

      - name: Manual deploy instructions
        if: steps.secrets.outputs.configured != 'true'
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Manual production deploy

          On the production server:

          ```bash
          cd /opt/smart_vehicle_repairs_system
          git fetch --tags
          git checkout ${{ inputs.ref }}
          bash scripts/validate-env.sh .env
          bash deploy/release.sh
          curl -sf http://localhost/api/health/ready/
          ```

          Configure GitHub secrets `DEPLOY_HOST`, `DEPLOY_USER`, `DEPLOY_SSH_KEY`, and optional `DEPLOY_PATH` for automated SSH deploy.
          EOF
