name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'config/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pytest.ini'
      - 'pytest.ci.ini'
      - 'manage.py'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/**'
      - 'config/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pytest.ini'
      - 'pytest.ci.ini'
      - 'manage.py'

jobs:
  test:
    name: Pytest (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: vehicle_repairs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d vehicle_repairs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql://ci:ci@localhost:5432/vehicle_repairs_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Celery beat schedule
        run: python scripts/validate_celery_beat.py

      - name: Run database migrations
        run: python manage.py migrate --noinput

      - name: Validate accounting integrity (smoke)
        run: python manage.py validate_accounting_integrity --no-fail --json

      - name: Run tests with coverage
        run: pytest -c pytest.ci.ini

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 14
