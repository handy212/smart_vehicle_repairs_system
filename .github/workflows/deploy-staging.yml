name: Deploy staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy to staging'
        required: false
        default: ''

jobs:
  gate:
    name: Validate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: vehicle_repairs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d vehicle_repairs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql://ci:ci@localhost:5432/vehicle_repairs_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - run: pip install -r requirements.txt
      - run: PYTHONPATH=. python scripts/validate_celery_beat.py
      - run: pytest -c pytest.ci.ini -m "not legacy_integration" -q

  deploy:
    name: Deploy staging server
    runs-on: ubuntu-latest
    needs: [gate]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/develop'

    steps:
      - name: Check staging deploy secrets
        id: secrets
        run: |
          if [[ -z "${{ secrets.STAGING_DEPLOY_HOST }}" ]]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Deploy over SSH
        if: steps.secrets.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.STAGING_DEPLOY_USER }}
          key: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          port: ${{ secrets.STAGING_DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ${{ secrets.STAGING_DEPLOY_PATH || '/opt/smart_vehicle_repairs_system' }}
            git fetch origin
            git checkout ${{ inputs.ref || 'develop' }}
            bash scripts/validate-env.sh .env
            bash deploy/release-staging.sh

      - name: Staging deploy instructions
        if: steps.secrets.outputs.configured != 'true'
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          ## Staging deploy (manual)

          Push to `develop` passed validation. On the staging server:

          ```bash
          git checkout develop
          bash scripts/validate-env.sh .env
          bash deploy/release-staging.sh
          ```

          For automated deploy, set secrets: `STAGING_DEPLOY_HOST`, `STAGING_DEPLOY_USER`, `STAGING_DEPLOY_SSH_KEY`.
          See [deploy/STAGING.md](../deploy/STAGING.md).
          EOF
