name: Release gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Pre-release validation
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: vehicle_repairs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d vehicle_repairs_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.testing
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql://ci:ci@localhost:5432/vehicle_repairs_test
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate Celery beat schedule
        run: PYTHONPATH=. python scripts/validate_celery_beat.py

      - name: Run backend tests
        run: pytest -c pytest.ci.ini -m "not legacy_integration" -q

      - name: Validate production compose config
        run: |
          cat > .env.ci <<'EOF'
          DJANGO_ENVIRONMENT=production
          SECRET_KEY=ci-compose-secret-key-minimum-fifty-characters-long-ok
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=svr_db
          DB_USER=svr_user
          DB_PASSWORD=ci-db-password-strong
          REDIS_PASSWORD=ci-redis-password-strong
          API_URL=http://localhost:8000/api
          CORS_ALLOWED_ORIGINS=http://localhost:3000
          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          EMAIL_HOST=localhost
          EMAIL_PORT=587
          EMAIL_USE_TLS=False
          EMAIL_HOST_USER=
          EMAIL_HOST_PASSWORD=
          EOF
          docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.ci config -q

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint and build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npx tsc --noEmit
          NEXT_PUBLIC_API_URL=http://localhost:8000/api npm run build
