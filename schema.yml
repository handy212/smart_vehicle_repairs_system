  /api/workorders/work-orders/get_recent_work_orders/:
    get:
      operationId: api_workorders_work_orders_get_recent_work_orders_retrieve
      description: |-
        Get recent completed/closed work orders for a vehicle.
        Useful for linking rework/return jobs to previous work orders.

        Query parameters:
        - vehicle: Vehicle ID (required)
        - days: Number of days to look back (default: 90)
        - status: Comma-separated list of statuses to filter (default: completed,invoiced,closed)
        - limit: Maximum number of results (default: 10)

        Returns:
        {
            "results": [
                {
                    "id": int,
                    "work_order_number": str,
                    "status": str,
                    "completed_at": str (ISO format),
                    "customer_concerns": str,
                    "technician_name": str,
                    "branch_name": str,
                    "days_ago": int
                }
            ]
        }
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
