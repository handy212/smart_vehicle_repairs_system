openapi: 3.0.3
info:
  title: Smart Vehicle Repairs API
  version: 2.0.0
  description: Comprehensive Vehicle Repair Management System with modules for Customers,
    Inventory, Billing, and Service Tracking.
  contact:
    name: SafeTrack Systems Support
    url: https://safetracksystems.com
    email: [EMAIL_ADDRESS]
