  /api/appointments/appointments/:
    get:
      operationId: api_appointments_appointments_list
      description: |-
        ViewSet for appointment operations

        Provides comprehensive appointment management including:
        - CRUD operations
        - Calendar views
        - Scheduling and rescheduling
        - Status management
        - Technician assignment
      parameters:
      - in: query
        name: appointment_date
        schema:
          type: string
          format: date
      - in: query
        name: customer
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: priority
        schema:
          type: string
          x-spec-enum-id: c93996a981d3b1c6
          enum:
          - high
          - low
          - normal
          - urgent
        description: |-
          Appointment priority

          * `low` - Low
          * `normal` - Normal
          * `high` - High
          * `urgent` - Urgent
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: service_bay
        schema:
          type: integer
      - in: query
        name: service_type
        schema:
          type: string
          x-spec-enum-id: 5e8444de48980e79
          enum:
          - brake_service
          - diagnostic
          - inspection
          - maintenance
          - oil_change
          - other
          - repair
          - tire_service
        description: |-
          Type of service requested

          * `inspection` - Inspection
          * `repair` - Repair
          * `maintenance` - Maintenance
          * `diagnostic` - Diagnostic
          * `tire_service` - Tire Service
          * `oil_change` - Oil Change
          * `brake_service` - Brake Service
          * `other` - Other
      - in: query
        name: status
        schema:
          type: string
          x-spec-enum-id: d3011782a38dd004
          enum:
          - cancelled
          - completed
          - confirmed
          - in_progress
          - no_show
          - pending
          - rescheduled
        description: |-
          Current appointment status

          * `pending` - Pending
          * `confirmed` - Confirmed
          * `in_progress` - In Progress
          * `completed` - Completed
          * `cancelled` - Cancelled
          * `no_show` - No Show
          * `rescheduled` - Rescheduled
      - in: query
        name: vehicle
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppointmentListList'
          description: ''
