          x-spec-enum-id: 4e4735a2502636ba
          enum:
          - cancelled
          - completed
          - dispatched
          - en_route
          - failed
          - in_progress
          - on_site
          - requested
        description: |-
          Current request status

          * `requested` - Requested
          * `dispatched` - Dispatched
          * `en_route` - En Route
          * `on_site` - On Site
          * `in_progress` - In Progress
          * `completed` - Completed
          * `cancelled` - Cancelled
          * `failed` - Failed
