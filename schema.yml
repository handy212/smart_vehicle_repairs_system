  /api/inspections/inspections/:
    get:
      operationId: api_inspections_inspections_list
      description: |-
        ViewSet for vehicle inspections.

        list: Get all inspections
        retrieve: Get single inspection with all results
        create: Create new inspection
        update: Update inspection
        destroy: Delete inspection

        Custom actions:
        - complete: Mark inspection as completed
        - approve: Approve inspection
        - reject: Reject inspection
        - add_result: Add result for an inspection item
        - send_to_customer: Send inspection report to customer
        - by_vehicle: Get inspections for a specific vehicle
        - recent: Get recent inspections
        - statistics: Get inspection statistics
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - in: query
        name: overall_result
        schema:
          type: string
          x-spec-enum-id: ea589d26936c266d
          nullable: true
          enum:
          - fail
          - needs_attention
          - pass
          - pass_with_advisory
        description: |-
          * `pass` - Pass
          * `pass_with_advisory` - Pass with Advisory
          * `fail` - Fail
          * `needs_attention` - Needs Attention
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: performed_by
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          x-spec-enum-id: ef1293a65a487313
          enum:
          - approved
          - completed
          - in_progress
          - rejected
        description: |-
          * `in_progress` - In Progress
          * `completed` - Completed
          * `approved` - Approved
          * `rejected` - Rejected
      - in: query
        name: template
        schema:
          type: integer
      - in: query
        name: vehicle
        schema:
          type: integer
      - in: query
        name: work_order
        schema:
          type: integer
