      description: |-
        ViewSet for managing payments

        list: Get all payments
        retrieve: Get single payment details
        create: Create new payment
        update: Update payment
        partial_update: Partially update payment
        destroy: Delete payment

        Custom actions:
        - refund: Refund a payment
        - recent: Get recent payments
        - by_method: Get payments by payment method
      parameters:
      - in: query
        name: customer
        schema:
          type: integer
      - in: query
        name: invoice
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: payment_date
        schema:
          type: string
          format: date-time
      - in: query
        name: payment_method
        schema:
          type: string
          x-spec-enum-id: 8408c18c6cfb0f9e
          enum:
          - ach
          - airteltigo_money
          - cash
          - check
          - credit_card
          - debit_card
          - hubtel_card
          - mtn_momo
          - other
          - paypal
          - paystack
          - venmo
          - vodafone_cash
          - wire
          - zelle
        description: |-
          * `cash` - Cash
          * `check` - Check
          * `credit_card` - Credit Card
          * `debit_card` - Debit Card
          * `ach` - ACH/Bank Transfer
          * `wire` - Wire Transfer
          * `paypal` - PayPal
          * `venmo` - Venmo
          * `zelle` - Zelle
          * `mtn_momo` - MTN Mobile Money
          * `vodafone_cash` - Vodafone Cash
          * `airteltigo_money` - AirtelTigo Money
          * `hubtel_card` - Card Payment (Hubtel)
          * `paystack` - Paystack
          * `other` - Other
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          x-spec-enum-id: e4885a93d68a9e50
          enum:
          - cancelled
          - completed
          - failed
          - pending
          - refunded
        description: |-
          * `pending` - Pending
          * `completed` - Completed
          * `failed` - Failed
          * `refunded` - Refunded
          * `cancelled` - Cancelled
      tags:
      - api
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPaymentList'
          description: ''
