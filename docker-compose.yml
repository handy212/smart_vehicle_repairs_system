version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: svr_db
    environment:
      POSTGRES_DB: ${DB_NAME:-svr_db}
      POSTGRES_USER: ${DB_USER:-svr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - svr_network
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-svr_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache/Queue
  redis:
    image: redis:7-alpine
    container_name: svr_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - svr_network
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: svr_backend
    command: gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 config.wsgi:application
    environment:
      - DJANGO_ENVIRONMENT=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - DATABASE_URL=postgresql://${DB_USER:-svr_user}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-svr_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - EMAIL_BACKEND=${EMAIL_BACKEND}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000/api}
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
      - static_volume:/app/staticfiles
    networks:
      - svr_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    expose:
      - 8000

  # Celery Worker
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: svr_celery
    command: celery -A config worker --loglevel=info
    environment:
      - DJANGO_ENVIRONMENT=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-svr_user}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-svr_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - EMAIL_BACKEND=${EMAIL_BACKEND}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD}
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - svr_network
    depends_on:
      - db
      - redis
      - backend
    restart: unless-stopped

  # Celery Beat
  celerybeat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: svr_celerybeat
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_ENVIRONMENT=production
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=postgresql://${DB_USER:-svr_user}:${DB_PASSWORD:-changeme}@db:5432/${DB_NAME:-svr_db}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    volumes:
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - svr_network
    depends_on:
      - db
      - redis
      - backend
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000/api}
    container_name: svr_frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000/api}
    networks:
      - svr_network
    restart: unless-stopped
    expose:
      - 3000

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: svr_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/var/www/static:ro
      - ./media:/var/www/media:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - svr_network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  static_volume:

networks:
  svr_network:
    driver: bridge

